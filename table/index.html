<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- user-scalable=no prevents accidental pinch-zoom mid-game -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Table — MTGStream</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07070f;
      --bg-card:  #0d0d1c;
      --border:   rgba(255,255,255,0.08);
      --accent:   #7c3aed;
      --text:     #e8e8f5;
      --dim:      rgba(232,232,245,0.45);
      --muted:    rgba(232,232,245,0.22);
      --p1-color: #7c3aed;
      --p2-color: #3b82f6;
      --btn-dec:  rgba(239,68,68,0.18);
      --btn-inc:  rgba(124,58,237,0.22);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      /* Prevent iOS text selection on long-press */
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Root layout ─────────────────────────────────────────────
       Portrait:  column  (P1 top, tabs middle, P2 bottom)
       Landscape: row     (P1 left, tabs middle, P2 right)       */
    #root {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    /* ── Player sections ───────────────────────────────────────── */
    .player-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      min-height: 0;
      position: relative;
    }

    /* P1 is rotated 180° so they can read from across the table */
    .player-section.p1 {
      transform: rotate(180deg);
      border-bottom: 1px solid var(--border);
    }

    .player-section.p2 {
      border-top: 1px solid var(--border);
    }

    /* Accent stripe — top of each section (which is "top" from that player's POV) */
    .player-section.p1::after,
    .player-section.p2::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 4px;
    }
    .player-section.p1::after  { bottom: 0; background: var(--p1-color); }
    .player-section.p2::before { top: 0;    background: var(--p2-color); }

    /* ── Name header ────────────────────────────────────────────── */
    .player-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 100%;
    }

    .player-role {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .player-name {
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      text-align: center;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Counter ────────────────────────────────────────────────── */
    .counter-display {
      font-size: clamp(80px, 22vw, 160px);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -4px;
      color: #fff;
      text-align: center;
      /* Brief scale pop on update */
      transition: transform 0.1s ease, color 0.2s;
    }
    .counter-display.bump {
      transform: scale(1.12);
      color: #c4b5fd;
    }
    .counter-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-top: -4px;
    }

    /* ── Inc / Dec buttons ──────────────────────────────────────── */
    .counter-buttons {
      display: flex;
      gap: 16px;
      width: 100%;
    }

    .counter-btn {
      flex: 1;
      /* Large touch target */
      min-height: clamp(72px, 14vw, 100px);
      border-radius: 18px;
      border: none;
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      color: #fff;
      /* Disable double-tap zoom & tap highlight on iOS */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s, background 0.12s, box-shadow 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .counter-btn:active {
      transform: scale(0.93);
    }

    .counter-btn.dec {
      background: rgba(239,68,68,0.16);
      box-shadow: inset 0 0 0 1px rgba(239,68,68,0.25);
      color: #fca5a5;
    }
    .counter-btn.dec:active {
      background: rgba(239,68,68,0.28);
    }

    .counter-btn.inc {
      background: rgba(34,197,94,0.16);
      box-shadow: inset 0 0 0 1px rgba(34,197,94,0.28);
      color: #86efac;
    }
    .counter-btn.inc:active {
      background: rgba(34,197,94,0.28);
    }

    /* Disabled state (counter already at 0) */
    .counter-btn.dec:disabled {
      opacity: 0.2;
      cursor: default;
    }

    /* ±5 buttons — deliberately smaller than ±1, which is the tap that
       happens fifty times a game and must be the easiest target to hit. */
    .counter-btn.step {
      width: 62px;
      height: 62px;
      font-size: 22px;
    }

    /* Life at or below 5 — the number the caster is watching */
    .counter-display.low { color: #f87171; }

    /* ── Poison / energy rows ──────────────────────────────────── */
    .extra-counters {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
      align-items: center;
    }

    .extra-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .extra-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .extra-btn:active  { background: rgba(255,255,255,0.14); }
    .extra-btn:disabled { opacity: 0.2; cursor: default; }

    .extra-val {
      min-width: 58px;
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .extra-row.poison .extra-val { color: #4ade80; }
    .extra-row.energy .extra-val { color: #facc15; }

    /* ── Center action buttons ─────────────────────────────────── */
    #center-actions {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 20px 10px;
    }

    .mini-btn {
      padding: 7px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--dim);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .mini-btn:active   { background: rgba(255,255,255,0.12); }
    .mini-btn.active   {
      background: rgba(124,58,237,0.20);
      border-color: rgba(124,58,237,0.45);
      color: #c4b5fd;
    }

    /* ── Center strip (tabs + play/draw) ───────────────────────── */
    #center-strip {
      flex-shrink: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Tab row — hidden when only one match */
    #tab-row {
      display: none;
      width: 100%;
      padding: 8px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 8px;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }
    #tab-row::-webkit-scrollbar { display: none; }
    #tab-row.visible { display: flex; }

    .match-tab {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--dim);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.14s, color 0.14s, border-color 0.14s;
      white-space: nowrap;
    }
    .match-tab.active {
      background: rgba(124,58,237,0.20);
      border-color: rgba(124,58,237,0.45);
      color: #c4b5fd;
    }
    .match-tab .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* Baron row — always visible */
    #play-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 20px;
    }

    .play-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(251,191,36,0.45);
      flex-shrink: 0;
      min-width: 90px;   /* fits "On the Play" without wrapping */
      text-align: center;
    }

    /* Arrow buttons — ▲ points to P1 (top), ▼ points to P2 (bottom) */
    .play-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(232,232,245,0.2);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.08s;
      flex-shrink: 0;
    }
    .play-arrow:active { transform: scale(0.91); }

    .play-arrow.active {
      background: rgba(251,191,36,0.16);
      border-color: rgba(251,191,36,0.55);
      color: #fbbf24;
      box-shadow: 0 0 14px rgba(251,191,36,0.28);
    }

    /* ── Connection badge ──────────────────────────────────────── */
    #conn-badge {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #conn-badge.live    { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.25); opacity: 0; }
    #conn-badge.offline { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.25); opacity: 1; }

    /* ── Landscape override ─────────────────────────────────────── */
    @media (orientation: landscape) {
      #root { flex-direction: row; }

      .player-section.p1 {
        border-bottom: none;
        border-right: 1px solid var(--border);
      }
      .player-section.p2 {
        border-top: none;
        border-left: 1px solid var(--border);
      }

      /* Accent stripes on sides in landscape */
      .player-section.p1::after  { bottom: auto; top: 0; height: 100%; width: 4px; left: auto; right: 0; }
      .player-section.p2::before { top: 0; height: 100%; width: 4px; right: auto; left: 0; }

      #center-strip {
        flex-direction: column;
        width: 100px;
        height: 100%;
        border-top: none;
        border-bottom: none;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        justify-content: center;
      }
      #tab-row {
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        border-bottom: none;
        border-right: 1px solid var(--border);
        padding: 8px 6px;
      }
      #play-row { flex-direction: column; padding: 8px 6px; gap: 8px; }
      .play-arrow { width: 100%; height: 40px; }
      .match-tab { text-align: center; padding: 8px 6px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <div id="conn-badge" class="offline">○ Offline</div>

  <div id="root">

    <!-- P1 section (rotated 180° — buttons end up at top/far edge, name near center) -->
    <div class="player-section p1" id="p1-section">
      <div class="player-header">
        <div class="player-role">Player 1</div>
        <div class="player-name" id="p1-name">—</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div class="counter-display" id="p1-counter">20</div>
        <div class="counter-label">Life</div>
        <div class="extra-counters" id="p1-extra"></div>
      </div>
      <div class="counter-buttons">
        <button class="counter-btn step dec" onclick="adjust(0,'life',-5)">−5</button>
        <button class="counter-btn dec"      onclick="adjust(0,'life',-1)">−</button>
        <button class="counter-btn inc"      onclick="adjust(0,'life',+1)">+</button>
        <button class="counter-btn step inc" onclick="adjust(0,'life',+5)">+5</button>
      </div>
    </div>

    <!-- Center strip: match tabs (if 2+) + play/draw + game controls -->
    <div id="center-strip">
      <div id="tab-row"><!-- populated by JS --></div>
      <div id="play-row">
        <button class="play-arrow" id="play-p1" onclick="setOnThePlay('p1')" title="P1 is on the play">▲</button>
        <span class="play-label">On the Play</span>
        <button class="play-arrow" id="play-p2" onclick="setOnThePlay('p2')" title="P2 is on the play">▼</button>
      </div>
      <div id="center-actions">
        <button class="mini-btn" onclick="toggleExtras()" id="extras-btn">Counters</button>
        <button class="mini-btn" onclick="newGame()" id="newgame-btn">New Game</button>
      </div>
    </div>

    <!-- P2 section (normal — name near center, buttons at bottom/far edge) -->
    <div class="player-section p2" id="p2-section">
      <div class="player-header">
        <div class="player-role">Player 2</div>
        <div class="player-name" id="p2-name">—</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div class="counter-display" id="p2-counter">20</div>
        <div class="counter-label">Life</div>
        <div class="extra-counters" id="p2-extra"></div>
      </div>
      <div class="counter-buttons">
        <button class="counter-btn step dec" onclick="adjust(1,'life',-5)">−5</button>
        <button class="counter-btn dec"      onclick="adjust(1,'life',-1)">−</button>
        <button class="counter-btn inc"      onclick="adjust(1,'life',+1)">+</button>
        <button class="counter-btn step inc" onclick="adjust(1,'life',+5)">+5</button>
      </div>
    </div>

  </div>

  <script>
    /* ── Local state ─────────────────────────────────────────── */
    let fullState   = null
    let selectedIdx = 0        // which match tab is selected on this page
    let showExtras  = false    // poison/energy rows hidden until asked for

    // Optimistic display values, so a tap lights up before the round-trip.
    // `pending` counts in-flight writes per player: while any are outstanding
    // we keep showing the local value, and once they all land we snap back to
    // whatever the server says. That keeps taps instant WITHOUT the old bug of
    // never re-syncing — a life correction typed in the control panel now
    // reaches the table instead of being ignored forever.
    const shown   = [null, null]   // { life, poison, energy } | null = uninitialised
    const pending = [0, 0]

    /* ── DOM refs ───────────────────────────────────────────── */
    const p1Name    = document.getElementById('p1-name')
    const p2Name    = document.getElementById('p2-name')
    const p1Counter = document.getElementById('p1-counter')
    const p2Counter = document.getElementById('p2-counter')
    const tabRow    = document.getElementById('tab-row')
    const connBadge = document.getElementById('conn-badge')

    const COUNTER_META = {
      poison: { glyph: '☠', label: 'Poison' },
      energy: { glyph: '⚡', label: 'Energy' },
    }

    /* ── Tap handler ─────────────────────────────────────────── */
    // Sends a DELTA, never an absolute total: two fast taps must both count,
    // and an absolute value computed from a stale local base would drop one.
    function adjust(playerIndex, counter, delta) {
      const cur = shown[playerIndex]
      if (!cur) return

      const next = cur[counter] + delta
      // Life may go negative (and showing that on stream is fine); the others can't.
      cur[counter] = counter === 'life' ? next : Math.max(0, next)

      renderCounters()
      bump(playerIndex === 0 ? p1Counter : p2Counter)

      pending[playerIndex]++
      fetch(`/api/state/matches/${selectedIdx}/player/${playerIndex}/counter/${counter}`, {
        method:  'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ delta }),
      })
        .catch(() => {})
        .finally(() => { pending[playerIndex] = Math.max(0, pending[playerIndex] - 1) })
    }

    function bump(el) {
      el.classList.remove('bump')
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          el.classList.add('bump')
          setTimeout(() => el.classList.remove('bump'), 120)
        })
      })
    }

    /* ── Play / draw ─────────────────────────────────────────── */
    function setOnThePlay(value) {
      // Tapping the active side again clears it.
      const slot    = fullState?.matches?.[selectedIdx]
      const current = slot?.match?.onThePlay ?? null
      const next    = current === value ? null : value

      fetch(`/api/state/matches/${selectedIdx}/match`, {
        method:  'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ onThePlay: next }),
      }).catch(() => {})
    }

    function toggleExtras() {
      showExtras = !showExtras
      document.getElementById('extras-btn').classList.toggle('active', showExtras)
      if (fullState) render(fullState)
    }

    function newGame() {
      // Life back to 20 for the next game of the match. Deliberately not
      // confirmed — it's cheap to undo by tapping, and a modal at the table
      // during a round is worse than an accidental reset.
      fetch(`/api/state/matches/${selectedIdx}/new-game`, { method: 'POST' })
        .then(() => { shown[0] = shown[1] = null })   // force resync from server
        .catch(() => {})
    }

    /* ── Render ──────────────────────────────────────────────── */
    function renderCounters() {
      for (const i of [0, 1]) {
        const v = shown[i]
        if (!v) continue
        const el = i === 0 ? p1Counter : p2Counter
        el.textContent = v.life
        el.classList.toggle('low', v.life <= 5)

        const extra = document.getElementById(`p${i + 1}-extra`)
        extra.innerHTML = ''
        for (const key of ['poison', 'energy']) {
          // A counter shows once it's in play, or whenever the operator has
          // opened the Counters tray to set one.
          if (v[key] === 0 && !showExtras) continue
          extra.appendChild(counterRow(i, key, v[key]))
        }
      }
    }

    function counterRow(playerIndex, key, value) {
      const { glyph, label } = COUNTER_META[key]
      const row = document.createElement('div')
      row.className = `extra-row ${key}`

      const dec = document.createElement('button')
      dec.className = 'extra-btn'
      dec.textContent = '−'
      dec.disabled = value === 0
      dec.onclick = () => adjust(playerIndex, key, -1)

      const val = document.createElement('span')
      val.className = 'extra-val'
      val.textContent = `${glyph} ${value}`
      val.title = label

      const inc = document.createElement('button')
      inc.className = 'extra-btn'
      inc.textContent = '+'
      inc.onclick = () => adjust(playerIndex, key, +1)

      row.append(dec, val, inc)
      return row
    }

    function renderOnThePlay(slot) {
      const v = slot?.match?.onThePlay ?? null
      document.getElementById('play-p1').classList.toggle('active', v === 'p1')
      document.getElementById('play-p2').classList.toggle('active', v === 'p2')
    }

    function render(state) {
      fullState = state
      const matches = state.matches ?? []

      /* ── Tab row ── */
      if (matches.length > 1) {
        tabRow.classList.add('visible')
        tabRow.innerHTML = ''
        matches.forEach((m, i) => {
          const btn = document.createElement('button')
          btn.className = 'match-tab' + (i === selectedIdx ? ' active' : '')
          const isLive = i === (state.activeMatchIndex ?? 0)
          btn.innerHTML = (isLive ? '<span class="live-dot"></span>' : '') +
                          escHtml(m.label ?? `Match ${m.id}`)
          btn.addEventListener('click', () => selectMatch(i))
          tabRow.appendChild(btn)
        })
      } else {
        tabRow.classList.remove('visible')
        selectedIdx = 0
      }

      /* ── Active match slot ── */
      const slot = matches[selectedIdx] ?? matches[0]
      if (!slot) return

      const players = [slot.players?.[0] ?? {}, slot.players?.[1] ?? {}]

      p1Name.textContent = players[0].name || 'Player 1'
      p2Name.textContent = players[1].name || 'Player 2'

      // Adopt the server's values whenever this page has no writes in flight.
      // Mid-tap we keep the local value so the number doesn't visibly bounce.
      for (const i of [0, 1]) {
        if (shown[i] === null || pending[i] === 0) {
          shown[i] = {
            life:   players[i].life   ?? 20,
            poison: players[i].poison ?? 0,
            energy: players[i].energy ?? 0,
          }
        }
      }

      renderCounters()
      renderOnThePlay(slot)
    }

    function selectMatch(i) {
      selectedIdx = i
      shown[0] = shown[1] = null   // resync from the newly selected slot
      pending[0] = pending[1] = 0
      if (fullState) render(fullState)
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    /* ── WebSocket ───────────────────────────────────────────── */
    function connect() {
      const ws = new WebSocket(`ws://${location.hostname}:${location.port || 3001}/ws`)

      ws.onopen = () => {
        connBadge.textContent = '● Live'
        connBadge.className   = 'live'
        // Fade the "live" badge out after 2s
        setTimeout(() => { connBadge.style.opacity = '0' }, 2000)
      }

      ws.onclose = () => {
        connBadge.textContent = '○ Offline'
        connBadge.className   = 'offline'
        connBadge.style.opacity = '1'
        setTimeout(connect, 2000)
      }

      ws.onerror = () => ws.close()

      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data)
          if (msg.type === 'state') render(msg.data)
        } catch {}
      }
    }

    connect()
  </script>
</body>
</html>
