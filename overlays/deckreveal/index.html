<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deck Reveal Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #reveal {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    #reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Top info bar ─────────────────────────────────── */
    .info-bar {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      background: rgba(8, 8, 8, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 3px solid #7c3aed;
      height: 136px;
      padding: 0 48px;
      gap: 0;
    }

    .deck-name-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 48px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .deck-label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(167,139,250,0.7);
      text-transform: uppercase;
      letter-spacing: 2.5px;
      margin-bottom: 8px;
    }

    .deck-name {
      font-size: 52px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -1px;
    }

    .player-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 48px;
      min-width: 340px;
      gap: 0;
    }

    .player-name {
      font-size: 36px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
      letter-spacing: -0.5px;
    }

    .player-meta {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .player-record {
      font-size: 30px;
      font-weight: 800;
      color: #c4b5fd;
      line-height: 1;
      letter-spacing: -0.5px;
      margin-top: 8px;
    }

    .meta-sep {
      color: rgba(255,255,255,0.25);
    }

    /* ── Analytics mini-charts ───────────────────────── */
    .charts-block {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 40px;
      border-right: 1px solid rgba(255,255,255,0.08);
      align-self: center;
    }

    .mini-chart {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
    }

    .mini-chart svg { display: block; }

    .mini-chart-label {
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ── Card grid area ───────────────────────────────── */
    /* Type groups are packed into columns (see planLayout) — a 60-card deck is
       mostly 4-ofs, so stacking every group in one column leaves the right half
       of the frame empty and forces the cards small. */
    .grid-area {
      flex: 1;
      padding: 28px 48px 24px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 24px;
      overflow: hidden;
    }

    .grid-col {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .type-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .type-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .type-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    /* Dark pill badge wrapping the section label */
    .type-header-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(6,6,6,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 4px 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .type-name {
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      text-transform: uppercase;
      letter-spacing: 2.5px;
    }

    .type-count {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.42);
    }

    .cards-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    /* card tile */
    .card-tile {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .card-tile img {
      display: block;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    .card-tile .placeholder {
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: rgba(255,255,255,0.2);
    }

    /* Dark pill badge beneath each card */
    .qty-label {
      background: rgba(6,6,6,0.88);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 3px 10px;
      min-width: 36px;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .qty-label.max {
      color: #c4b5fd;
      border-color: rgba(167,139,250,0.25);
    }

    /* loading / empty */
    .grid-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="reveal">
    <div class="info-bar">
      <div class="deck-name-block">
        <div class="deck-label">Deck Name</div>
        <div class="deck-name" id="deck-name">—</div>
      </div>
      <div class="charts-block" id="charts-block">
        <div class="mini-chart">
          <div class="mini-chart-label">Mana Curve</div>
          <div id="chart-fish"></div>
        </div>
        <div class="mini-chart">
          <div class="mini-chart-label">By Type</div>
          <div id="chart-type"></div>
        </div>
        <div class="mini-chart">
          <div class="mini-chart-label">By Color</div>
          <div id="chart-color"></div>
        </div>
      </div>
      <div class="player-block">
        <div class="player-name" id="player-name">—</div>
        <div class="player-meta">
          <span id="player-handle"></span>
          <span class="meta-sep" id="meta-sep-1"></span>
          <span id="player-pronouns"></span>
        </div>
        <div class="player-record" id="player-record"></div>
      </div>
    </div>
    <div class="grid-area" id="grid-area">
      <div class="grid-empty">No decklist loaded</div>
    </div>
  </div>

  <script src="/overlays/ws.js"></script>
  <script src="/overlays/mtg.js"></script>
  <script>
    const reveal   = document.getElementById('reveal')
    const gridArea = document.getElementById('grid-area')

    // Pie-slice colours keyed by the `color` label the server derives from
    // Scryfall's WUBRG array.
    const COLOR_LABELS = {
      'White':      MTG.COLORS.W,
      'Blue':       MTG.COLORS.U,
      'Black':      MTG.COLORS.B,
      'Red':        MTG.COLORS.R,
      'Green':      MTG.COLORS.G,
      'Multicolor': MTG.COLORS.Multicolor,
      'Colorless':  MTG.COLORS.Colorless,
    }

    // Mana curve. Buckets come from MTG.curve(), which excludes lands (a land
    // has no mana cost, and dumping 17 of them into the 0-drop bucket would
    // make every curve look identical) and collapses everything at 7+.
    function buildManaCurve(rows) {
      const buckets = MTG.curve(rows)

      // Trim trailing empty buckets so a deck topping out at 3 doesn't render
      // four blank columns, but always show at least 0–4 for a readable shape.
      let maxCmc = 4
      for (let i = 7; i >= 0; i--) {
        if (buckets[i] > 0) { maxCmc = Math.max(maxCmc, i); break }
      }
      if (buckets.every(b => b === 0)) return ''

      const W = 214, H = 82
      const numBars  = maxCmc + 1
      const maxVal   = Math.max(...buckets, 1)
      const barSlot  = Math.floor((W - 4) / numBars)
      const barW     = Math.max(6, barSlot - 2)
      const barAreaH = 54
      const baseY    = H - 16

      let content = ''
      for (let cmc = 0; cmc <= maxCmc; cmc++) {
        const count = buckets[cmc]
        const barH  = count > 0 ? Math.max(2, Math.round((count / maxVal) * barAreaH)) : 0
        const barX  = 2 + cmc * barSlot + Math.floor((barSlot - barW) / 2)
        const label = cmc === 7 ? '7+' : String(cmc)

        if (barH > 0) {
          const barY = baseY - barH
          content += `<rect x="${barX}" y="${barY}" width="${barW}" height="${barH}" fill="#d4af37" rx="1" opacity="0.88"/>`
          if (barH >= 14) {
            content += `<text x="${barX + barW / 2}" y="${barY - 2}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.75)" font-family="system-ui,sans-serif">${count}</text>`
          }
        }
        content += `<text x="${barX + barW / 2}" y="${H - 1}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.38)" font-family="system-ui,sans-serif">${label}</text>`
      }
      content += `<line x1="0" y1="${baseY + 1}" x2="${W}" y2="${baseY + 1}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`

      return `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">${content}</svg>`
    }

    function buildPieSVG(resolved, key, colorMap) {
      const counts = {}
      for (const card of resolved) {
        const val = (card[key] || 'Other').trim()
        counts[val] = (counts[val] || 0) + card.count
      }
      const total = Object.values(counts).reduce((s, n) => s + n, 0)
      if (total === 0) return ''

      const entries   = Object.entries(counts).sort((a, b) => b[1] - a[1])
      const maxLegend = 6
      const shown     = entries.slice(0, maxLegend)

      const R  = 36
      const cx = R + 1
      const cy = 40
      const legendX = cx * 2 + 10

      let slices = ''
      let angle  = -Math.PI / 2
      for (const [label, count] of shown) {
        const slice = (count / total) * 2 * Math.PI
        const end   = angle + slice
        const fill  = colorMap[label] || '#6b7280'

        if (slice >= 2 * Math.PI - 0.001) {
          slices += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${fill}"/>`
        } else {
          const x1 = (cx + R * Math.cos(angle)).toFixed(2)
          const y1 = (cy + R * Math.sin(angle)).toFixed(2)
          const x2 = (cx + R * Math.cos(end)).toFixed(2)
          const y2 = (cy + R * Math.sin(end)).toFixed(2)
          slices += `<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${slice > Math.PI ? 1 : 0},1 ${x2},${y2} Z" fill="${fill}"/>`
        }
        angle = end
      }

      let legend = ''
      const itemH  = Math.min(14, Math.floor(80 / shown.length))
      const startY = Math.round((80 - shown.length * itemH) / 2) + itemH - 4
      shown.forEach(([label, count], i) => {
        const ly   = startY + i * itemH
        const fill = colorMap[label] || '#6b7280'
        legend += `<rect x="${legendX}" y="${ly - 7}" width="7" height="7" fill="${fill}" rx="1"/>`
        legend += `<text font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.72)">`
        legend += `<tspan x="${legendX + 10}" y="${ly}">${label}</tspan>`
        legend += `<tspan fill="rgba(255,255,255,0.35)"> ${count}</tspan>`
        legend += `</text>`
      })

      const W = legendX + 90
      return `<svg width="${W}" height="80" xmlns="http://www.w3.org/2000/svg">${slices}${legend}</svg>`
    }

    function buildCharts(rows) {
      document.getElementById('chart-fish').innerHTML  = buildManaCurve(rows)
      document.getElementById('chart-type').innerHTML  = buildPieSVG(rows, 'type',  MTG.TYPE_COLORS)
      document.getElementById('chart-color').innerHTML = buildPieSVG(rows, 'color', COLOR_LABELS)
    }

    // Card viewer geometry — must stay in sync with overlays/cardviewer/index.html
    const CV_RIGHT  = 80   // right: 80px
    const CV_WIDTH  = 280  // card image width
    const CV_GUTTER = 24   // breathing room between grid and card viewer

    const GRID_PAD_L         = 48
    const GRID_PAD_R_DEFAULT = 48
    const GRID_PAD_R_ZOOM    = CV_RIGHT + CV_WIDTH + CV_GUTTER  // 384px

    // Fixed vertical budget: 1080 - 136 (info bar) - 52 (grid padding top+bottom) = 892px
    const AVAIL_H = 892

    // Layout constants (must match CSS)
    // HEADER_H: type-header-inner pill = 1px border + 4px padding + 12px font + 4px padding + 1px border = 22px, +4 safety
    const HEADER_H       = 26
    // HEADER_GAP: .type-group gap between header and cards-row
    const HEADER_GAP     = 10
    // LABEL_OVERHEAD: .card-tile gap(6) + qty-label pill = 1+3+14+3+1=22px rendered, +4 safety = 32
    const LABEL_OVERHEAD = 32
    const ROW_GAP        = 10   // .cards-row gap: between wrapped rows
    const GROUP_GAP      = 18   // .grid-area gap: between type-groups
    const CARD_GAP       = 10   // .cards-row gap: between cards horizontally

    let currentPlayerIndex = null
    let lastCardZoom       = null
    let gridBuilt          = false

    const COL_GAP    = 24
    const MAX_COLS   = 3
    // Scryfall card scans are 488×680.
    const CARD_RATIO = 488 / 680

    // Pack groups into `cols` columns, always adding the next group to the
    // shortest column, and report the height of the tallest one. Returns null
    // if any single group is too tall to ever fit.
    function packColumns(groups, cardH, colW, cols) {
      const cardW  = Math.round(cardH * CARD_RATIO)
      const perRow = Math.max(1, Math.floor((colW + CARD_GAP) / (cardW + CARD_GAP)))

      const heights = new Array(cols).fill(0)
      const buckets = Array.from({ length: cols }, () => [])

      for (const g of groups) {
        const rows = Math.ceil(g.length / perRow)
        const h = HEADER_H + HEADER_GAP
                + rows * (cardH + LABEL_OVERHEAD)
                + Math.max(0, rows - 1) * ROW_GAP

        let target = 0
        for (let i = 1; i < cols; i++) if (heights[i] < heights[target]) target = i

        heights[target] += (buckets[target].length ? GROUP_GAP : 0) + h
        buckets[target].push(g)
      }

      return { tallest: Math.max(...heights), buckets }
    }

    // Find the largest card height that fits, trying every column count and
    // keeping whichever gives the biggest cards. More columns means a narrower
    // column (so cards wrap sooner) but a shorter stack — the sweet spot
    // depends on the deck, so we just search it.
    function planLayout(groups, cardZoomActive) {
      if (groups.length === 0) {
        return { w: 120, h: 168, padR: GRID_PAD_R_DEFAULT, buckets: [] }
      }

      const padR   = cardZoomActive ? GRID_PAD_R_ZOOM : GRID_PAD_R_DEFAULT
      const availW = 1920 - GRID_PAD_L - padR

      let best = null

      for (let cols = 1; cols <= Math.min(MAX_COLS, groups.length); cols++) {
        const colW = Math.floor((availW - (cols - 1) * COL_GAP) / cols)

        let lo = 80, hi = 340, bestH = 0, bestBuckets = null
        while (lo <= hi) {
          const mid = (lo + hi) >> 1
          const { tallest, buckets } = packColumns(groups, mid, colW, cols)
          if (tallest <= AVAIL_H) {
            bestH = mid
            bestBuckets = buckets
            lo = mid + 1
          } else {
            hi = mid - 1
          }
        }

        if (bestH > 0 && (!best || bestH > best.h)) {
          best = { h: bestH, w: Math.round(bestH * CARD_RATIO), padR, colW, buckets: bestBuckets }
        }
      }

      // Nothing fit even at the minimum size — fall back to one column, smallest cards.
      if (!best) {
        const { buckets } = packColumns(groups, 80, availW, 1)
        best = { h: 80, w: Math.round(80 * CARD_RATIO), padR, colW: availW, buckets }
      }

      return best
    }

    function updateInfoBar(player) {
      document.getElementById('deck-name').textContent   = player.deckName || 'Untitled Deck'
      document.getElementById('player-name').textContent = player.name || 'TBD'

      const handle   = player.handle ? (player.handle.startsWith('@') ? player.handle : '@' + player.handle) : ''
      const pronouns = player.pronouns || ''
      const rec      = player.record ?? { w: 0, l: 0, d: 0 }
      const isBlankRecord = rec.w === 0 && rec.l === 0 && (rec.d ?? 0) === 0
      const recStr   = isBlankRecord ? '' : `${rec.w}–${rec.l}${rec.d ? '–' + rec.d : ''}`

      document.getElementById('player-handle').textContent   = handle
      document.getElementById('player-pronouns').textContent = pronouns
      document.getElementById('player-record').textContent   = recStr
      document.getElementById('meta-sep-1').textContent      = handle && pronouns ? '·' : ''

      // Hide meta row entirely if no handle/pronouns
      const metaEl = document.querySelector('.player-meta')
      if (metaEl) metaEl.style.display = (handle || pronouns) ? '' : 'none'
    }

    function buildGrid(rows, cardZoomActive) {
      const groups = MTG.groupByType(rows)

      // planLayout packs the groups into columns and hands back which groups
      // landed in which column, so we render straight from its decision.
      const { w: cardW, h: cardH, padR, colW, buckets } = planLayout(
        groups.map(([, g]) => g),
        cardZoomActive
      )

      // Map each group array back to its [typeName, cards] pair.
      const nameOf = new Map(groups.map(([name, g]) => [g, name]))

      gridArea.style.paddingRight = padR + 'px'
      gridArea.innerHTML = ''

      const columnEls = buckets.map(() => {
        const col = document.createElement('div')
        col.className = 'grid-col'
        col.style.width = colW + 'px'
        gridArea.appendChild(col)
        return col
      })

      buckets.forEach((groupsInCol, ci) => {
        for (const cards of groupsInCol) {
          columnEls[ci].appendChild(buildTypeGroup(nameOf.get(cards), cards, cardW, cardH))
        }
      })
    }

    function buildTypeGroup(typeName, cards, cardW, cardH) {
        const groupEl = document.createElement('div')
        groupEl.className = 'type-group'

        const groupTotal = cards.reduce((n, c) => n + c.count, 0)
        const headerEl = document.createElement('div')
        headerEl.className = 'type-header'
        headerEl.innerHTML =
          `<div class="type-header-inner">` +
          `<span class="type-name">${MTG.plural(typeName, groupTotal)}</span>` +
          `<span class="type-count">${groupTotal}</span></div>`
        groupEl.appendChild(headerEl)

        const rowEl = document.createElement('div')
        rowEl.className = 'cards-row'

        const sorted = [...cards].sort((a, b) =>
          b.count - a.count || (a.cmc ?? 0) - (b.cmc ?? 0) || a.name.localeCompare(b.name)
        )

        for (const card of sorted) {
          const tile = document.createElement('div')
          tile.className = 'card-tile'
          tile.style.width = cardW + 'px'

          const makePlaceholder = () => {
            const ph = document.createElement('div')
            ph.className    = 'placeholder'
            ph.style.width  = cardW + 'px'
            ph.style.height = cardH + 'px'
            ph.textContent  = '◆'
            return ph
          }

          if (card.imageUrl) {
            const img = document.createElement('img')
            img.width  = cardW
            img.height = cardH
            img.style.width     = cardW + 'px'
            img.style.height    = cardH + 'px'
            // Scryfall images are full, untrimmed card scans at a fixed 488×680.
            // `cover` keeps the frame square if the tile ratio drifts a pixel;
            // `fill` (which the old trimmed WebPs used) would visibly stretch it.
            img.style.objectFit = 'cover'
            img.alt     = card.name
            img.loading = 'lazy'
            img.onerror = function () { this.replaceWith(makePlaceholder()) }
            img.src     = card.imageUrl
            tile.appendChild(img)
          } else {
            tile.appendChild(makePlaceholder())
          }

          const label = document.createElement('div')
          label.className   = `qty-label${card.count >= 4 ? ' max' : ''}`
          label.textContent = `×${card.count}`
          tile.appendChild(label)

          rowEl.appendChild(tile)
        }

        groupEl.appendChild(rowEl)
        return groupEl
    }

    function getActive(state) {
      return state.matches?.[state.activeMatchIndex ?? 0] ?? null
    }

    function render(state) {
      const activeIdx      = state.overlay?.deckRevealActive ?? null
      const cardZoomActive = !!state.overlay?.cardZoom

      if (activeIdx === null) {
        reveal.classList.remove('visible')
        currentPlayerIndex = null
        lastCardZoom       = null
        gridBuilt          = false
        return
      }

      reveal.classList.add('visible')

      const player = getActive(state)?.players?.[activeIdx]
      if (!player) return

      // Info bar always stays current (cheap DOM text updates)
      updateInfoBar(player)

      const playerChanged = activeIdx !== currentPlayerIndex
      const zoomChanged   = cardZoomActive !== lastCardZoom

      if (playerChanged) {
        currentPlayerIndex = activeIdx
        gridBuilt          = false
        gridArea.innerHTML = ''
      }
      lastCardZoom = cardZoomActive

      // The deck reveal shows the mainboard — the sideboard is a separate story
      // beat and would blow the grid layout past its 892px vertical budget.
      const main = player.decklist?.main ?? []

      if (main.length === 0) {
        gridArea.innerHTML = '<div class="grid-empty">No decklist loaded</div>'
        gridBuilt = false
        return
      }

      // Only rebuild the DOM when something structural changed
      if (!gridBuilt || zoomChanged) {
        buildGrid(main, cardZoomActive)
        buildCharts(main)
        gridBuilt = true
      }
    }

    connectOverlay(msg => { if (msg.type === 'state') render(msg.data) })
  </script>
</body>
</html>
