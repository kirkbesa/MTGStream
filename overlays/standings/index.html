<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Standings Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      min-width: 560px;
    }

    #panel.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .round-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .round-label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-shadow:
        0 1px 3px rgba(0,0,0,1),
        0 2px 10px rgba(0,0,0,0.9),
        0 4px 20px rgba(0,0,0,0.7);
    }

    .round-name {
      font-size: 52px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      text-shadow:
        0 2px 4px rgba(0,0,0,1),
        0 4px 16px rgba(0,0,0,0.9),
        0 8px 40px rgba(0,0,0,0.6);
    }

    .standings-table {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      border-top: 3px solid #7c3aed;
    }

    .table-head {
      display: grid;
      grid-template-columns: 48px 1fr 80px 80px 80px;
      padding: 10px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .th {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .th.left { text-align: left; }

    .standings-row {
      display: grid;
      grid-template-columns: 48px 1fr 80px 80px 80px;
      padding: 10px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      align-items: center;
      transition: background 0.15s;
    }

    .standings-row:last-child { border-bottom: none; }
    .standings-row:hover { background: rgba(255,255,255,0.03); }

    .standings-row.top { background: rgba(124,58,237,0.08); }

    .rank {
      font-size: 18px;
      font-weight: 800;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }

    .standings-row.top .rank { color: #7c3aed; }

    .player-cell {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 12px;
      overflow: hidden;
    }

    .player-name {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .player-deck {
      font-size: 13px;
      font-weight: 500;
      color: rgba(167,139,250,0.75);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      line-height: 1.2;
    }

    .cell {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
    }

    .cell.wins { color: #4ade80; }
    .cell.losses { color: rgba(255,255,255,0.4); }

    #empty-state {
      text-align: center;
      padding: 40px 20px;
      font-size: 16px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div id="panel">
    <div class="round-header">
      <div class="round-label">Current Round</div>
      <div class="round-name" id="round-name">Round 1</div>
    </div>
    <div class="standings-table">
      <div class="table-head">
        <div class="th">#</div>
        <div class="th left">Player</div>
        <div class="th">W</div>
        <div class="th">L</div>
        <div class="th">D</div>
      </div>
      <div id="standings-body"></div>
    </div>
  </div>

  <script src="/overlays/ws.js"></script>
  <script>
    const panel = document.getElementById('panel')
    const body = document.getElementById('standings-body')

    function formatRound(r) {
      const s = (r ?? '').trim()
      return /^\d+$/.test(s) ? `Round ${s}` : (s || 'Round 1')
    }

    function getActive(state) {
      return state.matches?.[state.activeMatchIndex ?? 0] ?? null
    }

    function render(state) {
      const standings = state.standings ?? []
      const match = getActive(state)?.match ?? {}

      document.getElementById('round-name').textContent = formatRound(match.round)

      if (!state.overlay?.standingsVisible || standings.length === 0) {
        panel.classList.remove('visible')
        return
      }

      panel.classList.add('visible')

      body.innerHTML = ''
      standings.forEach((entry, i) => {
        // Skip fully blank rows (name and deckName both empty)
        if (!entry.name && !entry.deckName) return

        const row = document.createElement('div')
        row.className = `standings-row${i < 3 ? ' top' : ''}`
        const rec      = entry.record ?? { w: 0, l: 0, d: 0 }
        const deckSub  = entry.deckName
          ? `<div class="player-deck">${entry.deckName}</div>`
          : ''
        row.innerHTML = `
          <div class="rank">${i + 1}</div>
          <div class="player-cell">
            <div class="player-name">${entry.name || 'TBD'}</div>
            ${deckSub}
          </div>
          <div class="cell wins">${rec.w ?? 0}</div>
          <div class="cell losses">${rec.l ?? 0}</div>
          <div class="cell">${rec.d ?? 0}</div>`
        body.appendChild(row)
      })
    }

    connectOverlay(msg => { if (msg.type === 'state') render(msg.data) })
  </script>
</body>
</html>
