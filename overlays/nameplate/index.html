<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nameplate Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #nameplate {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      /* Grid locks the center block to the true screen midpoint.
         1fr auto 1fr: each player fills exactly half the remaining space;
         the center column never moves regardless of player name length. */
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
      padding: 0 48px 40px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    #nameplate.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Player panels ─────────────────────────────────── */
    .player {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;  /* pin the play/draw marker + player-inner to the bottom */
      min-width: 0;               /* allow grid to constrain width */
    }

    /* Horizontal flex: info section + In Play block side by side */
    .player-inner {
      flex: 1;              /* grow to fill .player wrapper — equalises both panels */
      display: flex;
      flex-direction: row;
      align-items: stretch;
      background: rgba(10, 10, 10, 0.82);
      backdrop-filter: blur(8px);
      border-top: 3px solid var(--accent, #7c3aed);
      overflow: hidden; /* clips in-play block corners cleanly */
    }

    .player-1 .player-inner { border-radius: 8px 0 0 8px; }
    .player-2 .player-inner {
      border-radius: 0 8px 8px 0;
      flex-direction: row-reverse; /* in-play block goes to the left (inner) side */
    }

    /* Info content */
    .player-content {
      flex: 1;
      min-width: 0;
      padding: 14px 20px 12px;
    }

    /* ── Name + record row ─────────────────────────────── */
    .name-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .player-2 .name-row { flex-direction: row-reverse; }

    .player-name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .player-record {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      flex-shrink: 0;
      line-height: 1.15;
    }

    .player-meta {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-deck {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-2 .player-name { text-align: right; }
    .player-2 .player-meta { text-align: right; }
    .player-2 .player-deck { text-align: right; }

    /* ── Life block — inner edge of each panel ─────────── */
    .life-block {
      width: 84px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex-shrink: 0;
      background: rgba(8, 8, 8, 0.96);
      position: relative;
    }

    .life-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.32);
    }

    .life-value {
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      color: #ffffff;
      font-variant-numeric: tabular-nums;   /* 19→20 must not shift width */
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    /* Low life reads instantly on stream — the single most useful thing the
       nameplate can signal. Below 1, the player is dead: hold it red. */
    .life-value.low {
      color: #f87171;
      text-shadow: 0 0 18px rgba(248,113,113,0.55);
    }

    /* Counter badges — poison / energy. Rendered only when non-zero, so a
       normal Pauper match shows a clean life-only block. */
    .counter-badges {
      display: flex;
      gap: 4px;
      margin-top: 2px;
      min-height: 0;
    }

    .counter-badge {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 999px;
      line-height: 1.4;
    }

    .counter-badge.poison { background: rgba(74,222,128,0.16); color: #4ade80; }
    .counter-badge.energy { background: rgba(250,204,21,0.16); color: #facc15; }

    /* ── "On the Play" label above the nameplate ───────── */
    .play-label {
      font-size: 12px;
      font-weight: 800;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding-bottom: 7px;
      opacity: 0;
      transition: opacity 0.35s ease;
      white-space: nowrap;
    }

    .play-label.visible { opacity: 1; }

    /* Aligned toward the inner (life) side */
    .player-1 .play-label { text-align: right; }
    .player-2 .play-label { text-align: left; }

    /* ── Center score block ────────────────────────────── */
    #score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 12px;
      gap: 4px;
      flex-shrink: 0;
      min-width: 120px;
    }

    .score-boxes {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-box {
      width: 44px;
      height: 52px;
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(8px);
      border-top: 3px solid #7c3aed;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }

    .score-sep {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
    }

    .round-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    /* Swiss: hide score boxes, show only round label */
    #score-block.swiss .score-boxes { display: none; }
    #score-block.swiss .round-label {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      padding-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="nameplate">

    <!-- Player 1 -->
    <div class="player player-1">
      <div class="play-label" id="play-label-p1">On the Play</div>
      <div class="player-inner">
        <div class="player-content">
          <div class="name-row">
            <div class="player-name" id="p1-name">Player 1</div>
            <div class="player-record" id="p1-record"></div>
          </div>
          <div class="player-meta" id="p1-meta"></div>
          <div class="player-deck" id="p1-deck"></div>
        </div>
        <div class="life-block">
          <div class="life-label">Life</div>
          <div class="life-value" id="life-p1">20</div>
          <div class="counter-badges" id="counters-p1"></div>
        </div>
      </div>
    </div>

    <!-- Center score block -->
    <div id="score-block" class="swiss">
      <div class="score-boxes">
        <div class="score-box" id="score-p1">0</div>
        <div class="score-sep">–</div>
        <div class="score-box" id="score-p2">0</div>
      </div>
      <div class="round-label" id="round-label">Round 1</div>
    </div>

    <!-- Player 2 -->
    <div class="player player-2">
      <div class="play-label" id="play-label-p2">On the Play</div>
      <div class="player-inner">
        <!-- DOM order same as P1; row-reverse CSS moves the life block to the left (inner) side -->
        <div class="player-content">
          <div class="name-row">
            <div class="player-name" id="p2-name">Player 2</div>
            <div class="player-record" id="p2-record"></div>
          </div>
          <div class="player-meta" id="p2-meta"></div>
          <div class="player-deck" id="p2-deck"></div>
        </div>
        <div class="life-block">
          <div class="life-label">Life</div>
          <div class="life-value" id="life-p2">20</div>
          <div class="counter-badges" id="counters-p2"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="/overlays/ws.js"></script>
  <script>
    function formatRound(r) {
      const s = (r ?? '').trim()
      return /^\d+$/.test(s) ? `Round ${s}` : (s || 'Round 1')
    }

    function getActive(state) {
      return state.matches?.[state.activeMatchIndex ?? 0] ?? null
    }

    const nameplate = document.getElementById('nameplate')

    function render(state) {
      const active = getActive(state)
      if (!active) return
      const { match, players } = active
      const overlay = state.overlay

      if (!overlay.nameplateVisible) { nameplate.classList.remove('visible'); return }
      nameplate.classList.add('visible')

      const [p1, p2] = players
      const isTopCut  = match.format === 'topcut'
      const scoreBlock = document.getElementById('score-block')
      scoreBlock.className = isTopCut ? 'topcut' : 'swiss'

      document.getElementById('round-label').textContent = formatRound(match.round)

      setPlayer('p1', p1)
      document.getElementById('score-p1').textContent = p1.gameScore ?? 0

      setPlayer('p2', p2)
      document.getElementById('score-p2').textContent = p2.gameScore ?? 0

      const onThePlay = match.onThePlay ?? null
      document.getElementById('play-label-p1').classList.toggle('visible', onThePlay === 'p1')
      document.getElementById('play-label-p2').classList.toggle('visible', onThePlay === 'p2')
    }

    // Life at or below this reads as "in danger" — a Pauper burn deck closes
    // from here in a single turn, so it's the number worth colouring.
    const LOW_LIFE = 5

    function setPlayer(prefix, p) {
      document.getElementById(`${prefix}-name`).textContent = p.name || 'TBD'

      const rec = p.record ?? { w: 0, l: 0, d: 0 }
      const isBlankRecord = rec.w === 0 && rec.l === 0 && (rec.d ?? 0) === 0
      document.getElementById(`${prefix}-record`).textContent =
        isBlankRecord ? '' : `(${rec.w}–${rec.l}${rec.d ? '–' + rec.d : ''})`

      const parts = []
      if (p.handle)   parts.push(p.handle.startsWith('@') ? p.handle : '@' + p.handle)
      if (p.pronouns) parts.push(p.pronouns)
      document.getElementById(`${prefix}-meta`).textContent = parts.join('  ·  ')
      document.getElementById(`${prefix}-deck`).textContent = p.deckName || ''

      const life = p.life ?? 20
      const lifeEl = document.getElementById(`life-${prefix}`)
      lifeEl.textContent = life
      lifeEl.classList.toggle('low', life <= LOW_LIFE)

      // Poison and energy only appear once they're actually in play.
      const badges = document.getElementById(`counters-${prefix}`)
      badges.innerHTML = ''
      if (p.poison > 0) badges.appendChild(badge('poison', '☠', p.poison))
      if (p.energy > 0) badges.appendChild(badge('energy', '⚡', p.energy))
    }

    function badge(kind, glyph, value) {
      const el = document.createElement('div')
      el.className = `counter-badge ${kind}`
      el.textContent = `${glyph} ${value}`
      return el
    }

    connectOverlay(msg => { if (msg.type === 'state') render(msg.data) })
  </script>
</body>
</html>
