<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nameplate Overlay</title>
  <link rel="stylesheet" href="/overlays/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #nameplate {
      position: absolute;
      inset: 0;
    }

    /* ── Left column — reserved for the card-preview overlay ──────
       Not rendered here (overlays/cardviewer draws the actual card);
       this just keeps both bars clear of it and centered on the rest
       of the frame, so the two layers never fight for the same pixels. */
    #card-preview-slot {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--card-col, 320px);
      pointer-events: none;
    }

    /* ── Top / bottom bars — one per player, full width minus the
       reserved card column ──────────────────────────────────────── */
    .bar {
      position: absolute;
      left: var(--card-col, 320px);
      right: 0;
      display: flex;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .bar-top    { top: 0;    transform: translateY(-14px); }
    .bar-bottom { bottom: 0; transform: translateY(14px); }

    .bar.visible { opacity: 1; transform: translateY(0); }

    .bar-inner {
      flex: 1;
      display: flex;
      align-items: stretch;
      background: rgba(10, 10, 10, 0.84);
      backdrop-filter: blur(8px);
    }

    /* Brand gradient stripe on the edge facing the game area (center of
       screen), rounded on the inner corner nearest the card column. */
    .bar-top .bar-inner {
      border-bottom: 3px solid transparent;
      border-image: var(--plph-gradient) 1;
      border-radius: 0 0 0 12px;
    }

    .bar-bottom .bar-inner {
      border-top: 3px solid transparent;
      border-image: var(--plph-gradient) 1;
      border-radius: 12px 0 0 0;
    }

    /* Info content */
    .player-content {
      flex: 1;
      min-width: 0;
      padding: 14px 24px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── Name + record + play-indicator row ────────────────────── */
    .name-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .player-name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 480px;
    }

    .player-record {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      flex-shrink: 0;
      line-height: 1.15;
    }

    .play-label {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 800;
      color: #1a1005;
      background: var(--plph-gold);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 4px 12px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.35s ease;
      white-space: nowrap;
    }

    .play-label.visible { opacity: 1; }

    .player-meta {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-deck {
      font-size: 15px;
      color: var(--plph-gold-dim);
      margin-top: 4px;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Life block ─────────────────────────────────────────────── */
    .life-block {
      width: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex-shrink: 0;
      background: rgba(8, 8, 8, 0.96);
      position: relative;
    }

    .life-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.32);
    }

    .life-value {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      color: #ffffff;
      font-variant-numeric: tabular-nums;   /* 19→20 must not shift width */
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    /* Low life reads instantly on stream — the single most useful thing the
       nameplate can signal. Below 1, the player is dead: hold it red. */
    .life-value.low {
      color: #f87171;
      text-shadow: 0 0 18px rgba(248,113,113,0.55);
    }

    /* Counter badges — poison / energy. Rendered only when non-zero, so a
       normal Pauper match shows a clean life-only block. */
    .counter-badges {
      display: flex;
      gap: 4px;
      margin-top: 2px;
      min-height: 0;
    }

    .counter-badge {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 999px;
      line-height: 1.4;
    }

    .counter-badge.poison { background: rgba(74,222,128,0.16); color: #4ade80; }
    .counter-badge.energy { background: rgba(250,204,21,0.16); color: #facc15; }

    /* ── Score / round bug — top bar only, far right ───────────── */
    #score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      gap: 4px;
      flex-shrink: 0;
      min-width: 120px;
      border-left: 1px solid rgba(255,255,255,0.08);
    }

    .score-boxes {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-box {
      width: 40px;
      height: 46px;
      background: rgba(10,10,10,0.88);
      border-top: 3px solid transparent;
      border-image: var(--plph-gradient) 1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
    }

    .score-sep {
      font-size: 20px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
    }

    .round-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    /* Swiss: hide score boxes, show only round label */
    #score-block.swiss .score-boxes { display: none; }
    #score-block.swiss .round-label {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div id="nameplate">

    <div id="card-preview-slot"></div>

    <!-- Player 1 — top bar -->
    <div class="bar bar-top" id="bar-p1">
      <div class="bar-inner">
        <div class="player-content">
          <div class="name-row">
            <div class="player-name" id="p1-name">Player 1</div>
            <div class="player-record" id="p1-record"></div>
            <div class="play-label" id="play-label-p1">On the Play</div>
          </div>
          <div class="player-meta" id="p1-meta"></div>
          <div class="player-deck" id="p1-deck"></div>
        </div>
        <div class="life-block">
          <div class="life-label">Life</div>
          <div class="life-value" id="life-p1">20</div>
          <div class="counter-badges" id="counters-p1"></div>
        </div>
        <div id="score-block" class="swiss">
          <div class="score-boxes">
            <div class="score-box" id="score-p1">0</div>
            <div class="score-sep">–</div>
            <div class="score-box" id="score-p2">0</div>
          </div>
          <div class="round-label" id="round-label">Round 1</div>
        </div>
      </div>
    </div>

    <!-- Player 2 — bottom bar -->
    <div class="bar bar-bottom" id="bar-p2">
      <div class="bar-inner">
        <div class="player-content">
          <div class="name-row">
            <div class="player-name" id="p2-name">Player 2</div>
            <div class="player-record" id="p2-record"></div>
            <div class="play-label" id="play-label-p2">On the Play</div>
          </div>
          <div class="player-meta" id="p2-meta"></div>
          <div class="player-deck" id="p2-deck"></div>
        </div>
        <div class="life-block">
          <div class="life-label">Life</div>
          <div class="life-value" id="life-p2">20</div>
          <div class="counter-badges" id="counters-p2"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="/overlays/ws.js"></script>
  <script>
    function formatRound(r) {
      const s = (r ?? '').trim()
      return /^\d+$/.test(s) ? `Round ${s}` : (s || 'Round 1')
    }

    function getActive(state) {
      return state.matches?.[state.activeMatchIndex ?? 0] ?? null
    }

    const barP1 = document.getElementById('bar-p1')
    const barP2 = document.getElementById('bar-p2')

    function render(state) {
      const active = getActive(state)
      if (!active) return
      const { match, players } = active
      const overlay = state.overlay

      if (!overlay.nameplateVisible) {
        barP1.classList.remove('visible')
        barP2.classList.remove('visible')
        return
      }
      barP1.classList.add('visible')
      barP2.classList.add('visible')

      const [p1, p2] = players
      const isTopCut  = match.format === 'topcut'
      const scoreBlock = document.getElementById('score-block')
      scoreBlock.className = isTopCut ? 'topcut' : 'swiss'

      document.getElementById('round-label').textContent = formatRound(match.round)

      setPlayer('p1', p1)
      document.getElementById('score-p1').textContent = p1.gameScore ?? 0

      setPlayer('p2', p2)
      document.getElementById('score-p2').textContent = p2.gameScore ?? 0

      const onThePlay = match.onThePlay ?? null
      document.getElementById('play-label-p1').classList.toggle('visible', onThePlay === 'p1')
      document.getElementById('play-label-p2').classList.toggle('visible', onThePlay === 'p2')
    }

    // Life at or below this reads as "in danger" — a Pauper burn deck closes
    // from here in a single turn, so it's the number worth colouring.
    const LOW_LIFE = 5

    function setPlayer(prefix, p) {
      document.getElementById(`${prefix}-name`).textContent = p.name || 'TBD'

      const rec = p.record ?? { w: 0, l: 0, d: 0 }
      const isBlankRecord = rec.w === 0 && rec.l === 0 && (rec.d ?? 0) === 0
      document.getElementById(`${prefix}-record`).textContent =
        isBlankRecord ? '' : `(${rec.w}–${rec.l}${rec.d ? '–' + rec.d : ''})`

      const parts = []
      if (p.handle)   parts.push(p.handle.startsWith('@') ? p.handle : '@' + p.handle)
      if (p.pronouns) parts.push(p.pronouns)
      document.getElementById(`${prefix}-meta`).textContent = parts.join('  ·  ')
      document.getElementById(`${prefix}-deck`).textContent = p.deckName || ''

      const life = p.life ?? 20
      const lifeEl = document.getElementById(`life-${prefix}`)
      lifeEl.textContent = life
      lifeEl.classList.toggle('low', life <= LOW_LIFE)

      // Poison and energy only appear once they're actually in play.
      const badges = document.getElementById(`counters-${prefix}`)
      badges.innerHTML = ''
      if (p.poison > 0) badges.appendChild(badge('poison', '☠', p.poison))
      if (p.energy > 0) badges.appendChild(badge('energy', '⚡', p.energy))
    }

    function badge(kind, glyph, value) {
      const el = document.createElement('div')
      el.className = `counter-badge ${kind}`
      el.textContent = `${glyph} ${value}`
      return el
    }

    connectOverlay(msg => { if (msg.type === 'state') render(msg.data) })
  </script>
</body>
</html>
