<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Decklist Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* One panel per player, each pinned to that player's side of the screen —
       P1 left, P2 right, matching where they sit on the nameplate. They're
       independent, so either, both, or neither can be on air; two lists side by
       side is what a caster comparing decks actually wants.

       Height follows the content: a fixed height leaves a slab of empty dark
       panel under a short list. Growth stops at MAX_PANEL_H, past which the
       content is zoom-scaled down to fit (see fitContent). */
    .panel {
      position: absolute;
      top: 60px;
      width: 400px;
      max-height: 960px;      /* keep in sync with MAX_PANEL_H below */
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    /* Each slides in from its nearest edge. */
    #panel-0 { left: 60px;  transform: translateX(-20px); }
    #panel-1 { right: 60px; transform: translateX(20px); }

    .panel.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      border-top: 3px solid #7c3aed;
      border-radius: 12px 12px 0 0;
    }

    .header-player {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .header-deck {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
      font-style: italic;
    }

    .header-count {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    /* No scrolling — content is zoom-scaled to fit.
       `flex: none` (not `flex: 1`) so this contributes its natural height to the
       panel: with flex-grow the panel would stretch to fill, which is exactly
       the fixed-height look we're getting rid of. */
    .scroll-area {
      overflow: hidden;
      flex: none;
      padding: 8px 0 12px;
      transform-origin: top left;
    }

    .type-group { margin-top: 4px; }

    .type-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 3px 20px 3px;
    }

    /* Text-only rows: quantity then name. No art, no mana pips — at sidebar
       width a 28px thumbnail reads as noise, and the list is scanned, not
       studied. Count leads because that's what a caster is looking for. */
    .card-row {
      display: flex;
      align-items: baseline;
      gap: 9px;
      padding: 2px 16px 2px 12px;
    }

    .card-count {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      min-width: 14px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* A full playset — the cards that define the deck */
    .card-count.max { color: #d4af37; }

    .card-name {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Unresolved rows */
    .card-name.bad { color: rgba(255,100,100,0.75); }
  </style>
</head>
<body>
  <div class="panel" id="panel-0">
    <div class="panel-header" id="header-0">
      <div class="header-player" id="header-player-0">Player</div>
      <div class="header-deck"   id="header-deck-0"></div>
      <div class="header-count"  id="header-count-0"></div>
    </div>
    <div class="scroll-area" id="scroll-area-0"></div>
  </div>

  <div class="panel" id="panel-1">
    <div class="panel-header" id="header-1">
      <div class="header-player" id="header-player-1">Player</div>
      <div class="header-deck"   id="header-deck-1"></div>
      <div class="header-count"  id="header-count-1"></div>
    </div>
    <div class="scroll-area" id="scroll-area-1"></div>
  </div>

  <script src="/overlays/ws.js"></script>
  <script src="/overlays/mtg.js"></script>
  <script>
    // The panel's max-height in CSS. Measuring panel.offsetHeight instead would
    // be circular now that the height follows the content — it'd report the
    // content height we're trying to test against.
    const MAX_PANEL_H = 960

    function getActive(state) {
      return state.matches?.[state.activeMatchIndex ?? 0] ?? null
    }

    // Which players' lists are up. An array — both can be on air at once. Older
    // saves stored a single index, so tolerate that shape too.
    function activeIndices(state) {
      const v = state.overlay?.decklistActive
      if (Array.isArray(v)) return v
      if (Number.isFinite(v)) return [v]
      return []
    }

    // Only scales down, and only when a list is too long to fit the cap. A
    // normal 60+15 list renders at 1:1 and the panel simply ends where the
    // cards end.
    function fitContent(pi) {
      const scrollArea = document.getElementById(`scroll-area-${pi}`)
      const header     = document.getElementById(`header-${pi}`)
      scrollArea.style.zoom = 1
      const availH   = MAX_PANEL_H - header.offsetHeight
      const naturalH = scrollArea.scrollHeight
      if (naturalH > availH) {
        scrollArea.style.zoom = availH / naturalH
      }
    }

    // Decklists arrive from state already resolved (name, cost, type, image),
    // so rendering is pure DOM work — no fetch, nothing to await, and nothing
    // that can fail if the venue network drops mid-match.
    function render(state) {
      const up = activeIndices(state)

      for (const pi of [0, 1]) {
        const panel = document.getElementById(`panel-${pi}`)

        if (!up.includes(pi)) {
          panel.classList.remove('visible')
          continue
        }

        const player = getActive(state)?.players?.[pi]
        if (!player) { panel.classList.remove('visible'); continue }

        panel.classList.add('visible')
        renderPanel(pi, player)
      }
    }

    function renderPanel(pi, player) {
      const scrollArea = document.getElementById(`scroll-area-${pi}`)

      document.getElementById(`header-player-${pi}`).textContent = player.name || 'TBD'
      document.getElementById(`header-deck-${pi}`).textContent   = player.deckName || ''

      const deck = player.decklist
      scrollArea.innerHTML = ''

      if (!deck) {
        document.getElementById(`header-count-${pi}`).textContent = 'No decklist loaded'
        return
      }

      const main = deck.main ?? []
      const side = deck.side ?? []
      const mainCount = main.reduce((n, c) => n + c.count, 0)
      const sideCount = side.reduce((n, c) => n + c.count, 0)

      document.getElementById(`header-count-${pi}`).textContent =
        `${mainCount} cards${sideCount ? ` · ${sideCount} sideboard` : ''}`

      for (const [type, rows] of MTG.groupByType(main)) {
        scrollArea.appendChild(buildGroup(type, rows))
      }

      if (side.length > 0) {
        scrollArea.appendChild(buildGroup('Sideboard', side, { sideboard: true }))
      }

      const unresolved = deck.unresolved ?? []
      if (unresolved.length > 0) {
        const groupEl = document.createElement('div')
        groupEl.className = 'type-group'
        const label = document.createElement('div')
        label.className = 'type-label'
        label.textContent = `Unresolved (${unresolved.length})`
        groupEl.appendChild(label)
        for (const u of unresolved) {
          const row = document.createElement('div')
          row.className = 'card-row'

          const count = document.createElement('div')
          count.className = 'card-count'
          count.textContent = u.count

          const name = document.createElement('div')
          name.className = 'card-name bad'
          name.textContent = u.rawName

          row.append(count, name)
          groupEl.appendChild(row)
        }
        scrollArea.appendChild(groupEl)
      }

      fitContent(pi)
    }

    function buildGroup(type, rows, { sideboard = false } = {}) {
      const groupEl = document.createElement('div')
      groupEl.className = 'type-group'

      const label = document.createElement('div')
      label.className = 'type-label'
      const groupCount = rows.reduce((n, c) => n + c.count, 0)
      label.textContent = sideboard
        ? `Sideboard  (${groupCount})`
        : `${MTG.plural(type, groupCount)}  (${groupCount})`
      if (!sideboard) label.style.color = MTG.typeColor(type)
      groupEl.appendChild(label)

      // Highest count first, then by mana cost — how a player would read
      // their own list: the 4-ofs that define the deck at the top.
      const sorted = [...rows].sort((a, b) =>
        b.count - a.count || (a.cmc ?? 0) - (b.cmc ?? 0) || a.name.localeCompare(b.name)
      )
      for (const row of sorted) groupEl.appendChild(buildRow(row))
      return groupEl
    }

    function buildRow(card) {
      const row = document.createElement('div')
      row.className = 'card-row'

      const count = document.createElement('div')
      // 4 is a playset — the deck's core. Worth flagging, as the old build did.
      count.className = `card-count${card.count >= 4 ? ' max' : ''}`
      count.textContent = card.count

      const name = document.createElement('div')
      name.className = 'card-name'
      name.textContent = card.name

      row.append(count, name)
      return row
    }

    connectOverlay(msg => { if (msg.type === 'state') render(msg.data) })
  </script>
</body>
</html>
