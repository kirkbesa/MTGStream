<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top 8 Bracket</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px; height: 1080px;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  #bracket-root {
    position: absolute;
    inset: 0;
    display: none;

    /* The layout below is authored in absolute coordinates that run
     *   x: 340 → 1900   (QF column left edge → champion box right edge)
     *   y: 126 → 984    (QF0 top → bottom of the "Quarterfinals" label)
     * which leaves 340px of margin on the left and 20px on the right — visibly
     * shoved to one side on a 1920x1080 canvas.
     *
     * Rather than re-number every box, connector line and label (and risk
     * breaking the connector geometry, which is hand-computed to line up with
     * the box centers), shift the whole thing as one unit:
     *   x: content is 1560 wide → centered left margin is 180 → shift -160
     *   y: content is  858 tall → centered top margin is 111 → shift  -15
     */
    transform: translate(-160px, -15px);
  }

  /* ── SVG connectors ─────────────────────────────────────── */
  #connector-svg {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    pointer-events: none;
  }

  /* ── Match group ────────────────────────────────────────── */
  .match-group {
    position: absolute;
    width: 360px;
  }

  /* ── Player box — horizontal flex row ──────────────────── */
  .pbox {
    width: 360px;
    height: 90px;
    padding: 0 12px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    border-radius: 6px;
    transition: background 0.35s ease, border-color 0.35s ease, opacity 0.35s ease;
    overflow: hidden;
  }

  .pbox--pending {
    background: rgba(14, 14, 22, 0.82);
    border: 1px solid rgba(255,255,255,0.18);
  }
  .pbox--winner {
    background: rgba(245, 243, 255, 0.92);
    border: 1px solid rgba(255,255,255,0.6);
  }
  .pbox--loser {
    background: rgba(6, 6, 10, 0.88);
    border: 1px solid rgba(255,255,255,0.06);
    opacity: 0.38;
  }
  .pbox--empty {
    background: rgba(14, 14, 22, 0.65);
    border: 1px solid rgba(255,255,255,0.22);
  }

  /* ── Seed — left column ─────────────────────────────────── */
  .pbox-seed {
    width: 26px;
    flex-shrink: 0;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: rgba(167,139,250,0.85);
    letter-spacing: 0.04em;
    line-height: 1;
  }

  /* ── Main area — name + record row, deck below ──────────── */
  .pbox-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  /* Name and record on same line */
  .pbox-name-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }

  .pbox-name {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.01em;
    color: rgba(255,255,255,0.95);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
    text-shadow: 0 1px 5px rgba(0,0,0,0.8);
    flex-shrink: 1;
    min-width: 0;
  }

  .pbox-record {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.42);
    flex-shrink: 0;
    line-height: 1;
    white-space: nowrap;
  }

  .pbox-deck {
    font-size: 13px;
    font-weight: 500;
    color: rgba(167,139,250,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
  }

  /* ── Score badge — right column ─────────────────────────── */
  .pbox-score {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 22px;
    font-weight: 800;
    color: rgba(255,255,255,0.88);
    line-height: 1;
    transition: opacity 0.25s;
  }
  .pbox-score--hidden { visibility: hidden; }

  /* ── Winner overrides — dark text on light bg ───────────── */
  .pbox--winner .pbox-seed   { color: rgba(109,40,217,0.7); }
  .pbox--winner .pbox-record { color: rgba(0,0,0,0.4); }
  .pbox--winner .pbox-name   { color: rgba(15,10,30,0.95); text-shadow: none; }
  .pbox--winner .pbox-deck   { color: rgba(109,40,217,0.65); }
  .pbox--winner .pbox-score  {
    background: rgba(109,40,217,0.1);
    border-color: rgba(109,40,217,0.3);
    color: rgba(109,40,217,0.85);
  }

  /* ── Loser overrides ────────────────────────────────────── */
  .pbox--loser .pbox-score   { opacity: 0.35; }

  /* ── Empty box ───────────────────────────────────────────── */
  .pbox--empty .pbox-seed   { visibility: hidden; }
  .pbox--empty .pbox-record { visibility: hidden; }
  .pbox--empty .pbox-deck   { display: none; }
  .pbox--empty .pbox-score  { visibility: hidden; }
  .pbox--empty .pbox-name {
    color: rgba(255,255,255,0.28);
    font-size: 16px;
    font-weight: 500;
    text-shadow: none;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── Match divider ────────────────────────────────────────── */
  .match-divider {
    height: 3px;
    background: rgba(255,255,255,0.08);
  }

  /* ── Champion box ────────────────────────────────────────── */
  #box-champion { width: 260px; }

  .pbox--champion {
    background: linear-gradient(135deg, rgba(250,204,21,0.22), rgba(250,204,21,0.08));
    border: 1px solid rgba(250,204,21,0.5);
    box-shadow: 0 0 28px rgba(250,204,21,0.18);
  }
  .pbox--champion .pbox-seed   { color: rgba(250,204,21,0.85); }
  .pbox--champion .pbox-record { color: rgba(255,255,255,0.45); }
  .pbox--champion .pbox-name   {
    color: rgba(255,255,255,0.98);
    text-shadow: 0 0 20px rgba(250,204,21,0.45), 0 1px 5px rgba(0,0,0,0.8);
  }
  .pbox--champion .pbox-deck   { color: rgba(250,204,21,0.72); }
</style>
</head>

<script src="/overlays/ws.js"></script>
<script>
  const root = document.getElementById('bracket-root')

  connectOverlay(msg => { if (msg.type === 'state') render(msg.data.bracket) })

  function render(bracket) {
    if (!bracket) { root.style.display = 'none'; return }
    root.style.display = bracket.active ? 'block' : 'none'

    bracket.rounds.forEach((round, ri) => {
      round.forEach((match, mi) => {
        const sA = match.scoreA ?? 0
        const sB = match.scoreB ?? 0
        const showScore = sA + sB > 0
        renderBox(ri, mi, 'a', match.a,
          match.winner === 'a' ? 'winner' : match.winner === 'b' ? 'loser' : 'pending',
          sA, showScore)
        renderBox(ri, mi, 'b', match.b,
          match.winner === 'b' ? 'winner' : match.winner === 'a' ? 'loser' : 'pending',
          sB, showScore)
      })
    })

    // Champion box — winner of rounds[2][0]
    const finalMatch = bracket.rounds[2]?.[0]
    const champ = finalMatch?.winner ? finalMatch[finalMatch.winner] : null
    const champBox = document.getElementById('box-champion')
    if (champBox) {
      if (!champ) {
        champBox.className = 'pbox pbox--empty'
        document.getElementById('seed-champion').textContent = ''
        document.getElementById('rec-champion').textContent  = ''
        document.getElementById('name-champion').textContent = 'TBD'
        document.getElementById('deck-champion').textContent = ''
      } else {
        champBox.className = 'pbox pbox--champion'
        document.getElementById('seed-champion').textContent = seedLabel(champ.seed)
        document.getElementById('rec-champion').textContent  = fmt(champ.record)
        document.getElementById('name-champion').textContent = champ.name || '—'
        document.getElementById('deck-champion').textContent = champ.deckName || ''
      }
    }
  }

  function fmt(r) {
    if (!r) return ''
    return `${r.w ?? 0}-${r.l ?? 0}${r.d ? '-' + r.d : ''}`
  }

  // A seed only exists for a player seeded from roster placements. Typing a name
  // into a slot by hand is the manual fallback and carries no seed — so render
  // nothing, rather than the literal "#undefined" this used to print.
  function seedLabel(seed) {
    return Number.isFinite(seed) ? `#${seed}` : ''
  }

  function renderBox(ri, mi, side, player, status, score, showScore) {
    const box     = document.getElementById(`box-r${ri}-m${mi}-${side}`)
    const seedEl  = document.getElementById(`seed-r${ri}-m${mi}-${side}`)
    const recEl   = document.getElementById(`rec-r${ri}-m${mi}-${side}`)
    const nameEl  = document.getElementById(`name-r${ri}-m${mi}-${side}`)
    const deckEl  = document.getElementById(`deck-r${ri}-m${mi}-${side}`)
    const scoreEl = document.getElementById(`score-r${ri}-m${mi}-${side}`)
    if (!box) return

    if (!player) {
      box.className       = 'pbox pbox--empty'
      seedEl.textContent  = ''
      recEl.textContent   = ''
      nameEl.textContent  = 'TBD'
      deckEl.textContent  = ''
      if (scoreEl) { scoreEl.textContent = '0'; scoreEl.classList.add('pbox-score--hidden') }
      return
    }

    box.className      = `pbox pbox--${status}`
    seedEl.textContent = seedLabel(player.seed)
    recEl.textContent  = fmt(player.record)
    nameEl.textContent = player.name || '—'
    deckEl.textContent = player.deckName || ''
    if (scoreEl) {
      scoreEl.textContent = score
      scoreEl.classList.toggle('pbox-score--hidden', !showScore)
    }
  }
</script>
</body>
</html>
