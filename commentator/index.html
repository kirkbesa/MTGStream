<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commentator — MTGStream</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --bg-card:   #0d0d1c;
      --bg-raised: #161628;
      --border:    rgba(255,255,255,0.08);
      --accent:    #7c3aed;
      --text:      #e8e8f5;
      --dim:       rgba(232,232,245,0.50);
      --muted:     rgba(232,232,245,0.28);
      --on-the-play:     #fbbf24;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .header-brand span { font-weight: 400; color: var(--dim); }

    .header-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .match-label { font-size: 14px; font-weight: 700; color: #fff; }

    .round-badge {
      font-size: 12px; font-weight: 600; color: var(--dim);
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 10px;
    }
    .format-badge {
      font-size: 11px; font-weight: 700; color: var(--accent);
      background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.25);
      border-radius: 20px; padding: 2px 9px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .ws-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .ws-badge.live    { color: #34d399; background: rgba(52,211,153,0.10); border: 1px solid rgba(52,211,153,0.18); }
    .ws-badge.offline { color: #f87171; background: rgba(248,113,113,0.10); border: 1px solid rgba(248,113,113,0.18); }

    /* ── Event bar ──────────────────────────────────────── */
    #event-bar {
      text-align: center; padding: 7px 20px; font-size: 13px; font-weight: 600;
      color: rgba(167,139,250,0.8); background: rgba(124,58,237,0.06);
      border-bottom: 1px solid rgba(124,58,237,0.15); display: none;
    }
    #event-bar.visible { display: block; }

    /* ── Main ───────────────────────────────────────────── */
    .main {
      max-width: 1400px; margin: 0 auto;
      padding: 18px 20px 40px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── Player cards ───────────────────────────────────── */
    .players-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 640px) { .players-row { grid-template-columns: 1fr; } }

    .player-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-top: 3px solid var(--accent); border-radius: 8px;
      padding: 14px 16px; display: flex; flex-direction: column; gap: 5px;
    }
    .player-card.p2 { border-top-color: #3b82f6; }

    .player-role { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .player-name { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -0.5px; line-height: 1.15; }
    .player-handle { font-size: 13px; color: var(--dim); }
    .player-deck { font-size: 14px; font-weight: 600; color: rgba(167,139,250,0.85); font-style: italic; }
    .player-record { font-size: 20px; font-weight: 800; color: rgba(255,255,255,0.55); letter-spacing: -0.5px; margin-top: 2px; }

    .player-stats { display: flex; align-items: center; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .stat-pill {
      display: flex; flex-direction: column; align-items: center;
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: 7px; padding: 5px 12px; min-width: 56px;
    }
    .stat-label { font-size: 9px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .stat-value { font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1; margin-top: 1px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .stat-value.low { color: #f87171; }   /* life <= 5 */

    .play-indicator { display: flex; align-items: center; gap: 7px; margin-top: 3px; }
    .play-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.14); flex-shrink: 0; }
    .play-dot.active { background: var(--on-the-play); border-color: var(--on-the-play); box-shadow: 0 0 8px rgba(251,191,36,0.5); }
    .play-text { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 1px; }
    .play-text.active { color: var(--on-the-play); }

    /* ── Timer ──────────────────────────────────────────── */
    #timer-row {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 20px;
      display: none; align-items: center; justify-content: center; gap: 16px;
    }
    #timer-row.visible { display: flex; }
    .timer-label-text { font-size: 11px; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; }
    #timer-display { font-size: 40px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; letter-spacing: -2px; line-height: 1; }
    #timer-display.warning  { color: #f97316; }
    #timer-display.critical { color: #ef4444; }
    #timer-display.turns    { color: #ef4444; font-size: 30px; letter-spacing: 3px; }

    /* ── Section card ───────────────────────────────────── */
    .section-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
    }
    .section-title {
      font-size: 11px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
    }
    .zoom-active-badge {
      font-size: 11px; font-weight: 600; color: #c4b5fd;
      background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.25);
      border-radius: 20px; padding: 1px 10px;
    }

    /* ── Card zoom search ───────────────────────────────── */
    .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-row input {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 15px;
      padding: 9px 12px; outline: none; font-family: inherit;
    }
    .search-row input:focus { border-color: var(--accent); background: rgba(124,58,237,0.07); }

    .btn-clear {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; color: var(--dim); font-size: 14px;
      padding: 0 14px; cursor: pointer; white-space: nowrap; font-family: inherit;
    }
    .btn-clear:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    #results-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 8px; max-height: 320px; overflow-y: auto;
    }
    .card-result {
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden; cursor: pointer;
      transition: border-color 0.14s, transform 0.1s;
    }
    .card-result:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
    .card-result.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .card-result img { width: 100%; aspect-ratio: 5/7; object-fit: cover; display: block; }
    .card-result-placeholder {
      width: 100%; aspect-ratio: 5/7; background: rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: rgba(255,255,255,0.12);
    }
    .card-type-bar { height: 3px; width: 100%; }
    .card-name-label {
      padding: 4px 5px; font-size: 10px; color: var(--text); line-height: 1.3;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .results-empty, .results-loading {
      grid-column: 1/-1; text-align: center; color: var(--dim);
      padding: 20px; font-size: 13px;
    }

    /* ── Deck section ───────────────────────────────────── */
    .decks-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    @media (max-width: 800px) { .decks-grid { grid-template-columns: 1fr; } }

    .deck-column {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; display: flex; flex-direction: column;
    }
    .deck-column.p1 { border-top: 3px solid var(--accent); }
    .deck-column.p2 { border-top: 3px solid #3b82f6; }

    .deck-header {
      padding: 11px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .deck-player-name { font-size: 15px; font-weight: 700; color: #fff; }
    .deck-name-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 2px; }
    .deck-archetype { font-size: 12px; color: rgba(167,139,250,0.8); font-style: italic; }
    .deck-total { font-size: 11px; font-weight: 600; color: var(--muted); }

    .deck-scroll { flex: 1; overflow-y: auto; padding: 6px 0 8px; max-height: 420px; }

    .deck-empty {
      padding: 24px; text-align: center;
      font-size: 13px; color: var(--muted);
    }

    .deck-type-section { margin-bottom: 2px; }

    .deck-type-header {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 14px 3px;
    }
    .deck-type-label {
      font-size: 10px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .deck-type-count {
      font-size: 10px; font-weight: 600;
      color: rgba(232,232,245,0.20);
    }

    .deck-card-row {
      display: flex; align-items: center; gap: 9px;
      padding: 5px 14px; cursor: pointer;
      transition: background 0.11s;
      border-radius: 0;
    }
    .deck-card-row:hover { background: rgba(255,255,255,0.06); }
    .deck-card-row.active { background: rgba(124,58,237,0.15); }

    .deck-card-thumb {
      width: 26px; height: 37px; border-radius: 3px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }

    .deck-card-count {
      font-size: 12px; font-weight: 700;
      color: var(--dim); min-width: 22px;
      text-align: right; flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .deck-card-count.max4 { color: #c4b5fd; font-weight: 800; }

    .deck-type-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }

    .deck-card-name {
      font-size: 13px; color: var(--text); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Notes editor ───────────────────────────────────── */
    .notes-section {
      margin-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 8px;
    }
    .notes-toggle {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; padding: 2px 0; width: 100%;
      font-size: 10px; font-weight: 700; color: rgba(232,232,245,0.35);
      text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; text-align: left; font-family: inherit;
      transition: color 0.14s;
    }
    .notes-toggle:hover { color: rgba(232,232,245,0.6); }
    .notes-caret { font-size: 9px; width: 10px; flex-shrink: 0; }
    .notes-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); opacity: 0.6; flex-shrink: 0;
    }
    .notes-body { margin-top: 7px; display: flex; flex-direction: column; }
    .notes-toolbar {
      display: flex; width: fit-content;
      border: 1px solid var(--border); border-bottom: none;
      border-radius: 5px 5px 0 0; overflow: hidden;
    }
    .notes-tab {
      background: rgba(255,255,255,0.03); border: none; border-right: 1px solid var(--border);
      color: rgba(232,232,245,0.45); font-size: 11px; font-weight: 600;
      padding: 3px 11px; cursor: pointer; font-family: inherit; transition: background 0.12s;
    }
    .notes-tab:last-child { border-right: none; }
    .notes-tab:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .notes-tab.active { background: rgba(124,58,237,0.15); color: #c4b5fd; }
    .notes-textarea {
      width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 0 5px 5px 5px; color: var(--text);
      font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6;
      padding: 9px 11px; resize: vertical; min-height: 72px; outline: none;
      transition: border-color 0.14s;
    }
    .notes-textarea:focus { border-color: rgba(124,58,237,0.4); }
    .notes-textarea::placeholder { color: rgba(232,232,245,0.2); }
    .notes-preview {
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 0 5px 5px 5px; font-size: 13px; line-height: 1.65;
      color: var(--text); padding: 9px 11px; min-height: 48px;
    }
    /* Match notes section card */
    .match-notes-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
    }

    /* ── Scrollbars ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.20); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-brand">MTGStream <span>(Commentator)</span></div>
    <div class="header-meta">
      <span class="match-label" id="match-label">—</span>
      <span class="round-badge" id="round-badge">Round 1</span>
      <span class="format-badge" id="format-badge">Swiss</span>
      <span class="ws-badge offline" id="ws-badge">○ Offline</span>
    </div>
  </div>

  <div id="event-bar"></div>

  <div class="main">

    <!-- Timer -->
    <div id="timer-row">
      <span class="timer-label-text" id="timer-label-text">Round Timer</span>
      <span id="timer-display">00:00</span>
    </div>

    <!-- Player info -->
    <div class="players-row">
      <div class="player-card" id="p1-card">
        <div class="player-role">Player 1</div>
        <div class="player-name" id="p1-name">—</div>
        <div class="player-handle" id="p1-handle"></div>
        <div class="player-deck" id="p1-deck"></div>
        <div class="player-record" id="p1-record"></div>
        <div class="player-stats">
          <div class="stat-pill">
            <div class="stat-label">Life</div>
            <div class="stat-value" id="p1-cip">0</div>
          </div>
          <div class="stat-pill" id="p1-score-pill" style="display:none">
            <div class="stat-label">Games Won</div>
            <div class="stat-value" id="p1-score">0</div>
          </div>
        </div>
        <div class="play-indicator">
          <div class="play-dot" id="p1-play-dot"></div>
          <span class="play-text" id="p1-play-text">On the Play</span>
        </div>
        <!-- P1 Notes -->
        <div class="notes-section" id="p1-notes-section">
          <button class="notes-toggle" onclick="toggleNotes('p1')">
            <span class="notes-caret" id="p1-notes-caret">▸</span>
            <span>Player Notes</span>
            <span class="notes-dot" id="p1-notes-dot" style="display:none"></span>
          </button>
          <div class="notes-body" id="p1-notes-body" style="display:none">
            <div class="notes-toolbar">
              <button class="notes-tab active" id="p1-edit-tab" onclick="setNotesMode('p1','edit')">Edit</button>
              <button class="notes-tab" id="p1-preview-tab" onclick="setNotesMode('p1','preview')">Preview</button>
            </div>
            <textarea class="notes-textarea" id="p1-notes-ta" rows="4"
              placeholder="Playstyle, tendencies, storylines… (not on stream)"
              oninput="onNotesInput('p1')"
              onfocus="onNotesFocus('p1')"
              onblur="onNotesBlur('p1')"></textarea>
            <div class="notes-preview" id="p1-notes-preview" style="display:none"></div>
          </div>
        </div>
      </div>

      <div class="player-card p2" id="p2-card">
        <div class="player-role">Player 2</div>
        <div class="player-name" id="p2-name">—</div>
        <div class="player-handle" id="p2-handle"></div>
        <div class="player-deck" id="p2-deck"></div>
        <div class="player-record" id="p2-record"></div>
        <div class="player-stats">
          <div class="stat-pill">
            <div class="stat-label">Life</div>
            <div class="stat-value" id="p2-cip">0</div>
          </div>
          <div class="stat-pill" id="p2-score-pill" style="display:none">
            <div class="stat-label">Games Won</div>
            <div class="stat-value" id="p2-score">0</div>
          </div>
        </div>
        <div class="play-indicator">
          <div class="play-dot" id="p2-play-dot"></div>
          <span class="play-text" id="p2-play-text">On the Play</span>
        </div>
        <!-- P2 Notes -->
        <div class="notes-section" id="p2-notes-section">
          <button class="notes-toggle" onclick="toggleNotes('p2')">
            <span class="notes-caret" id="p2-notes-caret">▸</span>
            <span>Player Notes</span>
            <span class="notes-dot" id="p2-notes-dot" style="display:none"></span>
          </button>
          <div class="notes-body" id="p2-notes-body" style="display:none">
            <div class="notes-toolbar">
              <button class="notes-tab active" id="p2-edit-tab" onclick="setNotesMode('p2','edit')">Edit</button>
              <button class="notes-tab" id="p2-preview-tab" onclick="setNotesMode('p2','preview')">Preview</button>
            </div>
            <textarea class="notes-textarea" id="p2-notes-ta" rows="4"
              placeholder="Playstyle, tendencies, storylines… (not on stream)"
              oninput="onNotesInput('p2')"
              onfocus="onNotesFocus('p2')"
              onblur="onNotesBlur('p2')"></textarea>
            <div class="notes-preview" id="p2-notes-preview" style="display:none"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Match notes -->
    <div class="match-notes-card">
      <button class="notes-toggle" onclick="toggleNotes('match')">
        <span class="notes-caret" id="match-notes-caret">▸</span>
        <span>Match Notes</span>
        <span class="notes-dot" id="match-notes-dot" style="display:none"></span>
      </button>
      <div class="notes-body" id="match-notes-body" style="display:none">
        <div class="notes-toolbar">
          <button class="notes-tab active" id="match-edit-tab" onclick="setNotesMode('match','edit')">Edit</button>
          <button class="notes-tab" id="match-preview-tab" onclick="setNotesMode('match','preview')">Preview</button>
        </div>
        <textarea class="notes-textarea" id="match-notes-ta" rows="3"
          placeholder="Round context, head-to-head history, storylines… (not on stream)"
          oninput="onNotesInput('match')"
          onfocus="onNotesFocus('match')"
          onblur="onNotesBlur('match')"></textarea>
        <div class="notes-preview" id="match-notes-preview" style="display:none"></div>
      </div>
    </div>

    <!-- Deck lists -->
    <div class="section-card" style="padding: 14px 16px 0">
      <div class="section-title" style="margin-bottom: 12px">
        Deck Lists
        <span style="font-size:11px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">
          Click any card to zoom on stream
        </span>
      </div>
      <div class="decks-grid" style="margin: 0 -16px; border-top: 1px solid var(--border)">
        <div class="deck-column p1" id="deck-col-0">
          <div class="deck-empty">No decklist loaded</div>
        </div>
        <div class="deck-column p2" style="border-left: 1px solid var(--border)" id="deck-col-1">
          <div class="deck-empty">No decklist loaded</div>
        </div>
      </div>
    </div>

    <!-- Card zoom search -->
    <div class="section-card">
      <div class="section-title">
        Card Zoom
        <span class="zoom-active-badge" id="zoom-badge" style="display:none"></span>
      </div>
      <div class="search-row">
        <input id="search-input" type="text" placeholder="Search cards to zoom…"
          autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="btn-clear" id="clear-btn">Clear</button>
      </div>
      <div id="results-grid">
        <div class="results-empty">Search for a card above</div>
      </div>
    </div>

  </div>

  <script src="/overlays/mtg.js"></script>
  <script>
    /* ── Lightweight markdown renderer ──────────────────── */
    function renderMd(raw) {
      if (!raw?.trim()) return '<span style="opacity:.35;font-style:italic">No notes</span>'
      const esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      return esc
        .replace(/^### (.+)$/gm, '<strong style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;opacity:.5">$1</strong>')
        .replace(/^## (.+)$/gm,  '<strong style="font-size:13px;font-weight:800">$1</strong>')
        .replace(/^# (.+)$/gm,   '<strong style="font-size:14px;font-weight:800">$1</strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g,     '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,     '<em>$1</em>')
        .replace(/_(.+?)_/g,       '<em>$1</em>')
        .replace(/^[-*•] (.+)$/gm, '<span style="display:flex;gap:5px"><span style="opacity:.4;flex-shrink:0">•</span><span>$1</span></span>')
        .replace(/\n{2,}/g, '<br><br>')
        .replace(/\n/g, '<br>')
    }

    /* ── Notes state ─────────────────────────────────────
       Each key: 'p1' | 'p2' | 'match'
       Tracks: server value, open state, mode, focus      */
    const notesState = {
      p1:    { serverVal: '', open: false, mode: 'edit', focused: false },
      p2:    { serverVal: '', open: false, mode: 'edit', focused: false },
      match: { serverVal: '', open: false, mode: 'edit', focused: false },
    }

    function toggleNotes(key) {
      const ns = notesState[key]
      ns.open = !ns.open
      document.getElementById(`${key}-notes-caret`).textContent = ns.open ? '▾' : '▸'
      document.getElementById(`${key}-notes-body`).style.display = ns.open ? 'flex' : 'none'
    }

    function setNotesMode(key, mode) {
      notesState[key].mode = mode
      const ta      = document.getElementById(`${key}-notes-ta`)
      const preview = document.getElementById(`${key}-notes-preview`)
      const editTab = document.getElementById(`${key}-edit-tab`)
      const prevTab = document.getElementById(`${key}-preview-tab`)
      if (mode === 'preview') {
        preview.innerHTML = renderMd(ta.value)
        ta.style.display      = 'none'
        preview.style.display = ''
        editTab.classList.remove('active'); prevTab.classList.add('active')
      } else {
        ta.style.display      = ''
        preview.style.display = 'none'
        editTab.classList.add('active'); prevTab.classList.remove('active')
      }
    }

    function onNotesFocus(key) { notesState[key].focused = true }
    function onNotesInput(key) { /* local only while typing — save happens on blur */ }

    /* ── Sync notes from server state ───────────────────
       Uses the active match index, not hardcoded 0.
       Also fixes the save endpoints above dynamically.   */
    let activeMatchIdx = 0

    function syncNotes(state) {
      const active = getActive(state)
      if (!active) return
      activeMatchIdx = state.activeMatchIndex ?? 0

      // Patch save URLs to use the real active index
      // (done inline in onNotesBlur using activeMatchIdx)

      function syncField(key, serverVal) {
        const ns = notesState[key]
        ns.serverVal = serverVal ?? ''
        // Only overwrite textarea if not focused (optimistic local state)
        if (!ns.focused) {
          document.getElementById(`${key}-notes-ta`).value = ns.serverVal
          // Refresh preview if open in preview mode
          if (ns.open && ns.mode === 'preview') {
            document.getElementById(`${key}-notes-preview`).innerHTML = renderMd(ns.serverVal)
          }
        }
        // Show dot indicator when there's content
        const dot = document.getElementById(`${key}-notes-dot`)
        if (dot) dot.style.display = ns.serverVal.trim() ? '' : 'none'
      }

      syncField('p1',    active.players[0]?.notes)
      syncField('p2',    active.players[1]?.notes)
      syncField('match', active.match?.notes)
    }

    /* Fix save endpoints to use real activeMatchIdx */
    function saveNotes(key, val) {
      if (key === 'match') {
        fetch(`/api/state/matches/${activeMatchIdx}/match`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notes: val }),
        }).catch(() => {})
      } else {
        const pi = key === 'p1' ? 0 : 1
        fetch(`/api/state/matches/${activeMatchIdx}/player/${pi}`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notes: val }),
        }).catch(() => {})
      }
    }

    function onNotesBlur(key) {
      notesState[key].focused = false
      const ta  = document.getElementById(`${key}-notes-ta`)
      const val = ta.value
      if (val !== notesState[key].serverVal) saveNotes(key, val)
    }

    /* ── Local state ─────────────────────────────────────── */
    let currentZoom = null
    let timerState  = null
    let matchFormat = 'swiss'
    let rafId       = null

    // Decklists arrive from state already resolved, so there's nothing to fetch
    // or cache. We only track the last-rendered signature per player to avoid
    // rebuilding the (large) deck column DOM on every unrelated state push —
    // a life tap shouldn't re-render 75 card rows.
    const deckSigs = [null, null]

    /* ── DOM ─────────────────────────────────────────────── */
    const wsBadge     = document.getElementById('ws-badge')
    const eventBar    = document.getElementById('event-bar')
    const matchLabel  = document.getElementById('match-label')
    const roundBadge  = document.getElementById('round-badge')
    const formatBadge = document.getElementById('format-badge')
    const timerRow    = document.getElementById('timer-row')
    const timerDisp   = document.getElementById('timer-display')
    const timerLbl    = document.getElementById('timer-label-text')
    const zoomBadge   = document.getElementById('zoom-badge')
    const searchInput = document.getElementById('search-input')
    const clearBtn    = document.getElementById('clear-btn')
    const resultsGrid = document.getElementById('results-grid')

    /* ── Timer helpers ───────────────────────────────────── */
    function pad2(n) { return String(Math.floor(Math.abs(n))).padStart(2, '0') }
    function fmtCd(s) { return `${pad2(s/60)}:${pad2(s%60)}` }
    function fmtCu(s) {
      const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60
      return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(ss)}` : `${pad2(m)}:${pad2(ss)}`
    }
    function formatRound(r) {
      const s = (r??'').trim()
      return /^\d+$/.test(s) ? `Round ${s}` : (s || 'Round 1')
    }

    function tick() {
      if (timerState) {
        const { duration, running, startedAt, accumulated } = timerState
        const live = (running && startedAt) ? (Date.now() - startedAt) / 1000 : 0
        if (matchFormat === 'swiss') {
          const rem = Math.ceil(duration - accumulated - live)
          if (rem <= 0) {
            timerDisp.textContent = 'TURNS'; timerDisp.className = 'turns'
            timerLbl.textContent = 'In Turns'
          } else {
            timerDisp.textContent = fmtCd(rem)
            timerDisp.className   = rem <= 60 ? 'critical' : rem <= 180 ? 'warning' : ''
            timerLbl.textContent  = 'Round Timer'
          }
        } else {
          timerDisp.textContent = fmtCu(Math.floor(accumulated + live))
          timerDisp.className   = ''
          timerLbl.textContent  = 'Match Timer'
        }
      }
      rafId = requestAnimationFrame(tick)
    }
    rafId = requestAnimationFrame(tick)

    /* ── Active match helper ─────────────────────────────── */
    function getActive(state) {
      return state.matches?.[state.activeMatchIndex ?? 0] ?? null
    }

    /* ── Main render ─────────────────────────────────────── */
    function render(state) {
      const active = getActive(state)
      if (!active) return
      const { match, players, timer } = active
      const overlay = state.overlay ?? {}

      matchLabel.textContent  = active.label ?? 'Feature Match'
      roundBadge.textContent  = formatRound(match.round)
      formatBadge.textContent = match.format === 'topcut' ? 'Top Cut' : 'Swiss'
      matchFormat             = match.format

      eventBar.textContent = state.eventName || ''
      eventBar.classList.toggle('visible', !!state.eventName)

      timerState = timer ?? null
      timerRow.classList.toggle('visible', overlay.timerVisible ?? false)

      const isTopCut  = match.format === 'topcut'
      const onThePlay = match.onThePlay ?? null
      renderPlayer('p1', players[0], isTopCut, onThePlay === 'p1')
      renderPlayer('p2', players[1], isTopCut, onThePlay === 'p2')

      // Deck lists — only re-resolve when decklist changes
      updateDecks(players)

      // Notes (internal, not on stream)
      syncNotes(state)

      // Card zoom badge
      const zoom = overlay.cardZoom ?? null
      if (zoom !== currentZoom) {
        currentZoom = zoom
        refreshHighlights()
      }
      zoomBadge.textContent    = zoom ? `On stream: ${zoom}` : ''
      zoomBadge.style.display  = zoom ? '' : 'none'
    }

    function renderPlayer(prefix, p, isTopCut, isOnThePlay) {
      document.getElementById(`${prefix}-name`).textContent = p.name || 'TBD'
      const parts = []
      if (p.handle)   parts.push(p.handle.startsWith('@') ? p.handle : '@' + p.handle)
      if (p.pronouns) parts.push(p.pronouns)
      document.getElementById(`${prefix}-handle`).textContent = parts.join('  ·  ')
      document.getElementById(`${prefix}-deck`).textContent   = p.deckName || ''
      const rec = p.record ?? { w:0, l:0, d:0 }
      const blank = rec.w===0 && rec.l===0 && (rec.d??0)===0
      document.getElementById(`${prefix}-record`).textContent =
        blank ? '' : `${rec.w}–${rec.l}${rec.d?'–'+rec.d:''}`

      // Life, plus poison/energy appended only when they're actually in play.
      const extras = []
      if (p.poison > 0) extras.push(`☠${p.poison}`)
      if (p.energy > 0) extras.push(`⚡${p.energy}`)
      const lifeEl = document.getElementById(`${prefix}-cip`)
      lifeEl.textContent = `${p.life ?? 20}${extras.length ? '  ' + extras.join(' ') : ''}`
      lifeEl.classList.toggle('low', (p.life ?? 20) <= 5)

      document.getElementById(`${prefix}-score`).textContent = p.gameScore ?? 0
      document.getElementById(`${prefix}-score-pill`).style.display = isTopCut ? '' : 'none'
      document.getElementById(`${prefix}-play-dot`).classList.toggle('active', isOnThePlay)
      document.getElementById(`${prefix}-play-text`).classList.toggle('active', isOnThePlay)
    }

    /* ── Deck rendering ──────────────────────────────────── */
    // Decklists come from state fully resolved — no fetching, no cache, no
    // "Resolving…" flash. We only skip work when nothing about the deck changed.
    function updateDecks(players) {
      for (let i = 0; i < 2; i++) {
        const p    = players[i]
        const deck = p?.decklist ?? null

        // Rebuild only when the deck (or the player it belongs to) actually
        // changed — otherwise every life tap would re-render the whole column.
        const sig = deck
          ? `${p?.name}|${p?.deckName}|${deck.main?.length}|${deck.side?.length}|${deck.main?.[0]?.identifier ?? ''}`
          : `${p?.name}|none`
        if (sig === deckSigs[i]) continue
        deckSigs[i] = sig

        const col = document.getElementById(`deck-col-${i}`)
        const headerInfo = {
          playerName: p?.name || (i === 0 ? 'Player 1' : 'Player 2'),
          deckName:   p?.deckName || '',
        }

        if (!deck || (deck.main ?? []).length === 0) {
          col.innerHTML = `
            <div class="deck-header">
              <div class="deck-player-name">${escHtml(headerInfo.playerName)}</div>
              ${headerInfo.deckName ? `<div class="deck-name-row"><span class="deck-archetype">${escHtml(headerInfo.deckName)}</span></div>` : ''}
            </div>
            <div class="deck-empty">No decklist loaded</div>`
          continue
        }

        buildDeckColumn(col, deck, headerInfo)
      }
    }

    function buildDeckColumn(col, deck, { playerName, deckName }) {
      const main  = deck.main ?? []
      const side  = deck.side ?? []
      const total = main.reduce((n, c) => n + c.count, 0)
      const sideTotal = side.reduce((n, c) => n + c.count, 0)

      let html = `
        <div class="deck-header">
          <div class="deck-player-name">${escHtml(playerName)}</div>
          <div class="deck-name-row">
            ${deckName ? `<span class="deck-archetype">${escHtml(deckName)}</span>` : '<span></span>'}
            <span class="deck-total">${total} cards</span>
          </div>
        </div>
        <div class="deck-scroll">`

      for (const [typeName, cards] of MTG.groupByType(main)) {
        const typeTotal = cards.reduce((n, c) => n + c.count, 0)
        html += section(MTG.plural(typeName, typeTotal), typeTotal, cards, MTG.typeColor(typeName))
      }

      // Casters need the sideboard more than anyone — it's the whole story of
      // games 2 and 3, so it gets its own section rather than being dropped.
      if (side.length > 0) {
        html += section('Sideboard', sideTotal, side, '#d4af37')
      }

      html += `</div>`
      col.innerHTML = html
    }

    function section(label, total, cards, color) {
      let html = `<div class="deck-type-section">
        <div class="deck-type-header">
          <span class="deck-type-label" style="color:${color}">${label}</span>
          <span class="deck-type-count">${total}</span>
        </div>`

      const sorted = [...cards].sort((a, b) =>
        b.count - a.count || (a.cmc ?? 0) - (b.cmc ?? 0) || a.name.localeCompare(b.name)
      )

      for (const card of sorted) {
        const isActive = currentZoom === card.identifier
        const imgEl    = card.imageUrl
          ? `<img class="deck-card-thumb" src="${card.imageUrl}" alt="${escHtml(card.name)}" loading="lazy" />`
          : `<div class="deck-card-thumb" style="background:rgba(255,255,255,0.06)"></div>`
        html += `
          <div class="deck-card-row${isActive ? ' active' : ''}"
               data-id="${card.identifier}"
               onclick="toggleZoom('${card.identifier}')">
            ${imgEl}
            <span class="deck-card-count${card.count >= 4 ? ' max4' : ''}">×${card.count}</span>
            <span class="deck-type-dot" style="background:${color}"></span>
            <span class="deck-card-name">${escHtml(card.name)}</span>
          </div>`
      }
      return html + `</div>`
    }

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
    }

    function toggleZoom(identifier) {
      setZoom(currentZoom === identifier ? null : identifier)
    }

    function refreshHighlights() {
      // Search results
      document.querySelectorAll('.card-result').forEach(el => {
        el.classList.toggle('active', el.dataset.id === currentZoom)
      })
      // Deck rows
      document.querySelectorAll('.deck-card-row').forEach(el => {
        el.classList.toggle('active', el.dataset.id === currentZoom)
      })
    }

    /* ── Card zoom search ───────────────────────────────── */
    let debounce = null

    searchInput.addEventListener('input', () => {
      clearTimeout(debounce)
      const q = searchInput.value.trim()
      if (!q) { resultsGrid.innerHTML = '<div class="results-empty">Search for a card above</div>'; return }
      debounce = setTimeout(() => fetchCards(q), 220)
    })

    clearBtn.addEventListener('click', () => {
      searchInput.value = ''
      resultsGrid.innerHTML = '<div class="results-empty">Search for a card above</div>'
      setZoom(null)
    })

    async function fetchCards(q) {
      resultsGrid.innerHTML = '<div class="results-loading">Searching…</div>'
      try {
        const cards = (await fetch(`/api/cards/search?q=${encodeURIComponent(q)}`).then(r=>r.json())).slice(0,10)
        resultsGrid.innerHTML = ''
        if (!cards.length) { resultsGrid.innerHTML = '<div class="results-empty">No cards found</div>'; return }
        for (const card of cards) {
          const btn = document.createElement('button')
          btn.className = `card-result${currentZoom===card.identifier?' active':''}`
          btn.dataset.id = card.identifier; btn.title = card.name
          if (card.imageUrl) {
            const img = document.createElement('img')
            img.src = card.imageUrl; img.alt = card.name; img.loading = 'lazy'
            img.onerror = () => img.replaceWith(makePlaceholder())
            btn.appendChild(img)
          } else { btn.appendChild(makePlaceholder()) }
          const bar = document.createElement('div')
          bar.className = 'card-type-bar'
          bar.style.background = MTG.typeColor(card.type)
          btn.appendChild(bar)
          const lbl = document.createElement('div')
          lbl.className = 'card-name-label'; lbl.textContent = card.name
          btn.appendChild(lbl)
          btn.addEventListener('click', () => setZoom(currentZoom===card.identifier?null:card.identifier))
          resultsGrid.appendChild(btn)
        }
      } catch {
        resultsGrid.innerHTML = '<div class="results-empty">Could not reach server</div>'
      }
    }

    function makePlaceholder() {
      const d = document.createElement('div'); d.className = 'card-result-placeholder'; d.textContent = '—'; return d
    }

    async function setZoom(identifier) {
      try {
        await fetch('/api/state/overlay', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cardZoom: identifier ?? null }),
        })
      } catch {}
    }

    /* ── WebSocket ──────────────────────────────────────── */
    function connect() {
      const ws = new WebSocket(`ws://${location.hostname}:${location.port||3001}/ws`)
      ws.onopen  = () => { wsBadge.textContent = '● Live';    wsBadge.className = 'ws-badge live' }
      ws.onclose = () => { wsBadge.textContent = '○ Offline'; wsBadge.className = 'ws-badge offline'; setTimeout(connect,2000) }
      ws.onerror = () => ws.close()
      ws.onmessage = e => {
        try { const m=JSON.parse(e.data); if(m.type==='state') render(m.data) } catch {}
      }
    }
    connect()
  </script>
</body>
</html>
